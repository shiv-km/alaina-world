<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Story Time 📖 — Alaina's World</title>
<style>
  :root {
    --bg: #fff9f0;
    --btn-radius: 22px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Library screen ── */
  #library {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 60px;
  }
  #library h1 {
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: #ff6b6b;
    text-shadow: 0 3px 0 #ffd93d;
    margin-bottom: 6px;
    text-align: center;
  }
  #library p.sub {
    color: #888;
    font-size: 1rem;
    margin-bottom: 24px;
  }
  .story-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 900px;
  }
  .story-card {
    border-radius: 22px;
    padding: 20px 12px 16px;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.13);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    border: none;
    outline: none;
  }
  .story-card:active { transform: scale(0.95); }
  .story-card .cover-emoji {
    font-size: 3.8rem;
    line-height: 1.1;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.18));
  }
  .story-card .story-title {
    font-size: 0.88rem;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    line-height: 1.25;
  }
  .back-home {
    display: inline-block;
    margin-bottom: 20px;
    padding: 10px 22px;
    background: #fff;
    border: 3px solid #ff6b6b;
    border-radius: 20px;
    font-size: 0.95rem;
    font-weight: bold;
    color: #ff6b6b;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none;
  }
  .back-home:active { transform: scale(0.95); }

  /* ── Story reader ── */
  #reader {
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
    background: #fff;
    z-index: 100;
  }
  #reader.open { display: flex; }

  /* Top bar */
  .reader-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(255,255,255,0.95);
    border-bottom: 2px solid #f0f0f0;
    flex-shrink: 0;
  }
  .reader-top .r-title {
    font-size: clamp(0.85rem, 3.5vw, 1.1rem);
    font-weight: bold;
    color: #333;
    text-align: center;
    flex: 1;
  }
  .top-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    font-size: 0.85rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .top-btn.exit { background: #ff6b6b; color: #fff; }
  .top-btn.pg   { background: #f0f0f0; color: #555; min-width: 60px; text-align: center; }

  /* Scene */
  .scene-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .scene-art {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  .art-inner {
    text-align: center;
    padding: 10px;
    width: 100%;
    pointer-events: none;
  }
  .art-inner .big-scene {
    font-size: clamp(4rem, 18vw, 9rem);
    line-height: 1.1;
    display: block;
    animation: scenePop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes scenePop {
    from { transform: scale(0.4) rotate(-8deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);   opacity: 1; }
  }
  .art-inner .scene-chars {
    font-size: clamp(2.5rem, 10vw, 5.5rem);
    display: block;
    margin-top: 8px;
    animation: slideUp 0.4s ease forwards;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* Text box */
  .story-text-box {
    background: rgba(255,255,255,0.97);
    border-top: 3px solid #f0f0f0;
    padding: 14px 20px;
    flex-shrink: 0;
  }
  .story-text-box p {
    font-size: clamp(1rem, 3.5vw, 1.35rem);
    color: #222;
    line-height: 1.55;
    text-align: center;
  }

  /* Nav */
  .reader-nav {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.98);
    border-top: 2px solid #f0f0f0;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    padding: 14px 10px;
    border: none;
    border-radius: 18px;
    font-size: clamp(1rem, 4vw, 1.2rem);
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { transform: scale(0.95); }
  .nav-btn.prev { background: #e0e0e0; color: #333; }
  .nav-btn.next { background: #4ecdc4; color: #fff; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Page-end card */
  .end-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 18px;
    padding: 20px;
  }
  .end-card .end-emoji { font-size: 5rem; animation: scenePop 0.5s ease forwards; }
  .end-card h2 { font-size: clamp(1.4rem, 5vw, 2rem); color: #ff6b6b; text-align: center; }
  .end-card .moral {
    background: #fff9d0;
    border-left: 5px solid #ffd93d;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    color: #555;
    line-height: 1.5;
    max-width: 480px;
    text-align: center;
  }
  .end-btn {
    padding: 14px 32px;
    background: #ff6b6b;
    color: #fff;
    border: none;
    border-radius: 22px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
  }

  /* Confetti burst on end */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 50%;
    pointer-events: none;
    animation: confettiFall linear forwards;
    z-index: 9999;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- ── Library ── -->
<div id="library">
  <a href="index.html" class="back-home">🏠 Back to Alaina's World</a>
  <h1>📖 Story Time!</h1>
  <p class="sub">Choose a story to read</p>
  <div class="story-grid" id="storyGrid"></div>
</div>

<!-- ── Reader ── -->
<div id="reader">
  <div class="reader-top">
    <button class="top-btn exit" onclick="closeReader()">✕ Stories</button>
    <span class="r-title" id="readerTitle"></span>
    <button class="top-btn pg"   id="pageCounter"></button>
  </div>
  <div class="scene-wrap">
    <div class="scene-art" id="sceneArt"></div>
    <div class="story-text-box" id="textBox"></div>
  </div>
  <div class="reader-nav">
    <button class="nav-btn prev" id="prevBtn" onclick="changePage(-1)">◀ Back</button>
    <button class="nav-btn next" id="nextBtn" onclick="changePage(1)">Next ▶</button>
  </div>
</div>

//  BUILD LIBRARY
// ═══════════════════════════════════════════════════════
const grid = document.getElementById('storyGrid');
const bgPatterns = [
  'radial-gradient(circle at 20% 80%, rgba(255,255,255,0.2) 0%, transparent 50%)',
];

STORIES.forEach((story, i) => {
  const card = document.createElement('button');
  card.className = 'story-card';
  card.style.background = story.cardColor;
  card.style.backgroundImage = bgPatterns[0];
  card.innerHTML = `
    <span class="cover-emoji">${story.cover}</span>
    <div class="story-title">${story.title}</div>
  `;
  card.addEventListener('click', () => openStory(i));
  grid.appendChild(card);
});

// ═══════════════════════════════════════════════════════
//  READER LOGIC
// ═══════════════════════════════════════════════════════
let activeStory = null;
let currentPage = 0;

function openStory(idx) {
  activeStory = STORIES[idx];
  currentPage = 0;
  document.getElementById('readerTitle').textContent = activeStory.title;
  const reader = document.getElementById('reader');
  reader.classList.add('open');
  renderPage();
}

function closeReader() {
  document.getElementById('reader').classList.remove('open');
  activeStory = null;
}

function changePage(dir) {
  if (!activeStory) return;
  const total = activeStory.pages.length;
  if (dir === 1 && currentPage === total) return;
  if (dir === -1 && currentPage === 0) return;
  currentPage += dir;
  renderPage();
}

function renderPage() {
  const story = activeStory;
  const total = story.pages.length;
  const sceneArt = document.getElementById('sceneArt');
  const textBox = document.getElementById('textBox');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const pageCounter = document.getElementById('pageCounter');

  prevBtn.disabled = currentPage === 0;

  if (currentPage === total) {
    // End card
    pageCounter.textContent = 'The End!';
    nextBtn.disabled = true;
    textBox.style.display = 'none';

    sceneArt.style.background = story.bg;
    sceneArt.innerHTML = `
      <div class="end-card">
        <span class="end-emoji">🎉</span>
        <h2>The End!</h2>
        <div class="moral">💡 <strong>Lesson:</strong> ${story.moral}</div>
        <button class="end-btn" onclick="closeReader()">📚 More Stories</button>
      </div>
    `;
    launchConfetti();
    return;
  }

  const page = story.pages[currentPage];
  pageCounter.textContent = `${currentPage + 1} / ${total}`;
  nextBtn.disabled = false;
  nextBtn.textContent = currentPage === total - 1 ? 'Finish 🎉' : 'Next ▶';
  if (currentPage === total - 1) {
    nextBtn.style.background = '#ff6b6b';
  } else {
    nextBtn.style.background = '#4ecdc4';
  }

  textBox.style.display = '';
  sceneArt.style.background = story.bg;
  sceneArt.innerHTML = `
    <div class="art-inner">
      <span class="big-scene" style="animation-delay:0s">${page.art}</span>
      <span class="scene-chars" style="animation-delay:0.15s">${page.chars}</span>
    </div>
  `;
  textBox.innerHTML = `<p>${page.text}</p>`;

  // Re-trigger animations by cloning
  const bigScene = sceneArt.querySelector('.big-scene');
  const sceneChars = sceneArt.querySelector('.scene-chars');
  void bigScene.offsetWidth;
  void sceneChars.offsetWidth;
}

function launchConfetti() {
  const colors = ['#ff6b6b','#ffd93d','#4ecdc4','#a29bfe','#ff9f43','#55efc4','#fd79a8'];
  for (let i = 0; i < 45; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (8 + Math.random() * 10) + 'px';
    el.style.height = (8 + Math.random() * 10) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

// Swipe support
let touchStartX = 0;
document.getElementById('reader').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('reader').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) changePage(dx < 0 ? 1 : -1);
}, { passive: true });
</script>
