// ═══════════════════════════════════════════════
function catchStarsAt(x, y) {
    for (let i = items.length-1; i >= 0; i--) {
        if (Math.hypot(x-items[i].x, y-items[i].y) < 65) {
            playSound(1200,'sine',0.1); items.splice(i,1); score++;
        }
    }
}
function triggerPianoKey(y) {
    const kh = canvas.height/8, idx = Math.floor(y/kh);
    if (idx < 0 || idx >= 8) return;
    if (activeKeys['_lastKey'] !== idx) { playSound(261.63*Math.pow(1.059,idx*3)); activeKeys['_lastKey'] = idx; }
    activeKeys[idx] = 10;
}
function getDrumZone(px, py) {
    for (const z of DRUM_ZONES) {
        const zx=z.x*canvas.width, zy=z.y*canvas.height, zw=z.w*canvas.width, zh=z.h*canvas.height;
        if (px>=zx && px<zx+zw && py>=zy && py<zy+zh) return z.zone;
    }
    return null;
}

// ═══════════════════════════════════════════════
//  POINTER EVENTS
// ═══════════════════════════════════════════════
canvas.addEventListener('pointerdown', e => {
    unlockAudio(); isPointerDown = true;
    const p = canvasPos(e);

    if (currentMode === 'paint' || currentMode === 'glow') { lastX = p.x; lastY = p.y; }
    if (currentMode === 'abc') abcTap();
    if (currentMode === 'starCatcher') catchStarsAt(p.x, p.y);
    if (currentMode === 'mobilePiano') triggerPianoKey(p.y);
    if (currentMode === 'bubblePop') {
        items.forEach(b => {
            if (!b.popped && Math.hypot(p.x-b.x, p.y-b.y) < b.r) {
                playSound(900,'sine',0.1); b.popped = true; b.v = -5; score++;
            }
        });
    }
    if (currentMode === 'glow') {
        glowOsc = audioCtx.createOscillator(); glowGain = audioCtx.createGain();
        glowOsc.type = 'sine'; glowGain.gain.setValueAtTime(0, audioCtx.currentTime);
        glowGain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime+0.1);
        glowOsc.connect(glowGain); glowGain.connect(audioCtx.destination); glowOsc.start();
    }
    if (currentMode === 'fireworks') {
        const dx = p.x - canvas.width/2, dy = p.y - (canvas.height-30);
        const dist = Math.hypot(dx,dy), speed = Math.min(dist/25, 18);
        items.push({type:'rocket', x:canvas.width/2, y:canvas.height-30, tx:p.x, ty:p.y,
            vx:(dx/dist)*speed, vy:(dy/dist)*speed, hue:Math.random()*360, life:100});
    }
    if (currentMode === 'snowflake') basketX = p.x;
    if (currentMode === 'cloudJumper') {
        for (let i = items.length-1; i >= 0; i--) {
            if (items[i].type==='drop' && Math.hypot(p.x-items[i].x, p.y-items[i].y) < 55) {
                playSound(600,'sine',0.1); items.splice(i,1); score++; break;
            }
        }
    }
    if (currentMode === 'butterfly') {
        for (let i = items.length-1; i >= 0; i--) {
            const b = items[i];
            if (!b.caught && Math.hypot(p.x-b.x, p.y-(b.y-b.size*0.4)) < b.size*0.9) {
                playSound(800+Math.random()*400,'sine',0.2); b.caught = true; b.catchAnim = 20; score++; break;
            }
        }
    }
    if (currentMode === 'numberBounce') {
        const n = Math.floor(Math.random()*10)+1;
        playSound(300+n*40,'sine',0.2);
        const u = new SpeechSynthesisUtterance(String(n)); u.pitch = 1.4;
        window.speechSynthesis.speak(u);
        items.push({char:String(n), x:p.x, y:-60, vy:5, vx:(Math.random()-0.5)*6, size:90, hue:Math.random()*360});
    }
    if (currentMode === 'colorMatch' && !colorFeedback && colorOptions.length > 0) {
        const topH = canvas.height*0.35, boxY = topH+10;
        const boxW = canvas.width/2-10, boxH = (canvas.height-boxY-10)/2;
        for (let idx = 0; idx < 4; idx++) {
            const col = idx%2, row = Math.floor(idx/2);
            const x = col*(boxW+20)+5, y = boxY+row*(boxH+10);
            if (p.x>=x && p.x<=x+boxW && p.y>=y && p.y<=y+boxH) {
                const correct = idx===colorTarget;
                colorFeedback = {correct, tapped:idx};
                if (correct) { playSound(880,'sine',0.12); setTimeout(()=>playSound(1100,'sine',0.12),100); score++; colorSpeed=Math.max(60,colorSpeed-8); }
                else playSadSound();
                setTimeout(colorMatchNewRound, 600);
                break;
            }
        }
    }
    if (currentMode === 'drumKit') {
        const zone = getDrumZone(p.x, p.y);
        if (zone) { playDrum(zone); drumActive[zone] = 10; drumActive['_last'] = zone; }
    }
    if (currentMode === 'songBuilder' && songGrid) {
        const cellW = (canvas.width-40)/8, cellH = (canvas.height-80)/8;
        const col = Math.floor((p.x-20)/cellW), row = Math.floor((p.y-60)/cellH);
        if (col>=0 && col<8 && row>=0 && row<8) {
            songGrid[col][row] = !songGrid[col][row];
            if (songGrid[col][row]) playSound(SONG_NOTES[7-row],'sine',0.25);
        }
    }
    if (currentMode === 'frogJump' && !frogTongue) {
        frogTongue = {tx:p.x, ty:p.y, progress:0, phase:'extend'};
        playSound(500,'triangle',0.04);
    }
    if (currentMode === 'popEverything' && !popGameOver) {
        for (let i = items.length-1; i >= 0; i--) {
            const it = items[i];
            if (Math.hypot(p.x-it.x, p.y-it.y) < it.size*0.55) {
                playSound(400+Math.random()*600,'sine',0.08); items.splice(i,1); score++; break;
            }
        }
    }
    if (currentMode === 'memoryMatch' && !memLocked) {
        const card = memCards.find(c => !c.flipped && !c.matched &&
            p.x>=c.x && p.x<=c.x+c.w && p.y>=c.y && p.y<=c.y+c.h);
        if (card) {
            playSound(600,'sine',0.1); card.flipped = true; memFlipped.push(card);
            if (memFlipped.length === 2) {
                memLocked = true;
                setTimeout(() => {
                    if (memFlipped[0].emoji === memFlipped[1].emoji) {
                        memFlipped[0].matched = memFlipped[1].matched = true;
                        memMatched++; score++;
                        playSound(880,'sine',0.1); setTimeout(()=>playSound(1100,'sine',0.1),100);
                        if (memMatched === memCards.length/2) { addStars(5); showToast('🎉 You matched them all!'); }
                    } else { memFlipped[0].flipped = memFlipped[1].flipped = false; playSadSound(); }
                    memFlipped = []; memLocked = false;
                }, 900);
            }
        }
    }
    if (currentMode === 'animalSound') {
        const a = ANIMALS[animalIdx];
        animalSpeak(a);
        if (animalTimer2) clearTimeout(animalTimer2);
        animalTimer2 = setTimeout(() => {
            if (currentMode!=='animalSound') return;
            animalIdx = (animalIdx+1) % ANIMALS.length;
            animalTimer2 = setTimeout(() => animalSpeak(ANIMALS[animalIdx]), 600);
        }, 3200);
    }
    if (currentMode === 'shapeMatch' && !shapeFeedback && shapeOptions.length>0) {
        const boxW = canvas.width/2 - 16, startY = canvas.height*0.42;
        const boxH = (canvas.height*0.55)/2 - 12;
        for (let i=0; i<4; i++) {
            const bx = 8+(i%2)*(boxW+16), by = startY+Math.floor(i/2)*(boxH+12);
            if (p.x>=bx && p.x<=bx+boxW && p.y>=by && p.y<=by+boxH) {
                const ok = i===shapeTarget; shapeFeedback = {correct:ok, tapped:i};
                if (ok) { playSound(880,'sine',0.12); setTimeout(()=>playSound(1100,'sine',0.12),100); score++; }
                else playSadSound();
                setTimeout(shapeMatchNewRound, 700); break;
            }
        }
    }
    if (currentMode === 'mathFun' && !mathFeedback && mathProblem) {
        const boxW = canvas.width/3 - 14, by = canvas.height*0.72;
        for (let i=0; i<3; i++) {
            const bx = 8+i*(boxW+12);
            if (p.x>=bx && p.x<=bx+boxW && p.y>=by && p.y<=by+80) {
                const ok = mathOptions[i]===mathProblem.ans; mathFeedback = {correct:ok, tapped:i};
                if (ok) { playSound(880,'sine',0.12); setTimeout(()=>playSound(1100,'sine',0.12),100); score++; }
                else playSadSound();
                setTimeout(mathNewRound, 700); break;
            }
        }
    }
    if (currentMode === 'wordMatch' && !wordFeedback && wordOptions.length>0) {
        const boxW = canvas.width/2 - 16, startY = canvas.height*0.47;
        const boxH = (canvas.height*0.5)/2 - 12;
        for (let i=0; i<4; i++) {
            const bx = 8+(i%2)*(boxW+16), by = startY+Math.floor(i/2)*(boxH+12);
            if (p.x>=bx && p.x<=bx+boxW && p.y>=by && p.y<=by+boxH) {
                const ok = i===wordTarget; wordFeedback = {correct:ok, tapped:i};
                if (ok) { playSound(880,'sine',0.12); setTimeout(()=>playSound(1100,'sine',0.12),100); score++; }
                else playSadSound();
                setTimeout(wordMatchNewRound, 700); break;
            }
        }
    }
    if (currentMode === 'balloonPop') {
        for (let i=items.length-1; i>=0; i--) {
            const b = items[i];
            if (Math.hypot(p.x-b.x, p.y-b.y) < b.r) {
                if (b.num===balloonTarget) {
                    playSound(700,'sine',0.1); setTimeout(()=>playSound(900,'sine',0.1),80);
                    items.splice(i,1); score++; balloonTarget++;
                    if (balloonTarget>10) { addStars(3); showToast('🎈 1 to 10 — Amazing!'); balloonTarget=1; }
                } else { playSadSound(); b.shake=10; }
                break;
            }
        }
    }
    if (currentMode === 'colorMix' && mixQ && !mixFeedback) {
        const boxW = canvas.width/3 - 14, by = canvas.height*0.72;
        for (let i=0; i<3; i++) {
            const bx = 8+i*(boxW+12);
            if (p.x>=bx && p.x<=bx+boxW && p.y>=by && p.y<=by+90) {
                const ok = i===mixQ.correctIdx; mixFeedback = {correct:ok, tapped:i};
                if (ok) { playSound(880,'sine',0.12); setTimeout(()=>playSound(1100,'sine',0.12),100); score++; }
                else playSadSound();
                setTimeout(colorMixNewRound, 800); break;
            }
        }
    }
});

canvas.addEventListener('pointermove', e => {
    const p = canvasPos(e);
    if ((currentMode==='paint'||currentMode==='glow') && isPointerDown) {
        if (lastX===null) { lastX=p.x; lastY=p.y; return; }
        ctx.beginPath(); ctx.strokeStyle = `hsl(${hue},100%,50%)`;
        if (currentMode==='glow') {
            ctx.shadowBlur=15; ctx.shadowColor=ctx.strokeStyle; ctx.lineWidth=20;
            if (glowOsc) glowOsc.frequency.setTargetAtTime(200+(canvas.height-p.y), audioCtx.currentTime, 0.05);
        } else { ctx.lineWidth=30; ctx.shadowBlur=0; }
        ctx.lineCap='round'; ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke();
        lastX=p.x; lastY=p.y; hue=(hue+4)%360;
    }
    if (currentMode==='magicWand' && isPointerDown) {
        for (let k=0;k<4;k++) items.push({type:'sparkle', x:p.x+(Math.random()-0.5)*15, y:p.y+(Math.random()-0.5)*15,
            vx:(Math.random()-0.5)*4, vy:-1-Math.random()*4, hue, life:40+Math.random()*30, maxLife:65,
            size:16+Math.random()*14, char:WAND_CHARS[Math.floor(Math.random()*WAND_CHARS.length)]});
        if (Math.random()<0.08) items.push({type:'butterfly', x:p.x, y:p.y, vx:(Math.random()-0.5)*2.5,
            vy:-0.5-Math.random(), hue:Math.random()*360, wobble:0, wobbleSpeed:0.08+Math.random()*0.08, life:130, maxLife:140});
        hue=(hue+3)%360;
        playSound(400+Math.random()*600,'sine',0.04);
    }
    if (currentMode==='rainbowSlide') { hue=(p.y/canvas.height)*360; playSound(200+(canvas.height-p.y),'sine',0.05); }
    if (currentMode==='fruit') basketX = p.x;
    if (currentMode==='snowflake') basketX = p.x;
    if (currentMode==='starCatcher' && isPointerDown) catchStarsAt(p.x,p.y);
    if (currentMode==='mobilePiano' && isPointerDown) triggerPianoKey(p.y);
    if (currentMode==='drumKit' && isPointerDown) {
        const zone = getDrumZone(p.x, p.y);
        if (zone && zone !== drumActive['_last']) { playDrum(zone); drumActive[zone]=10; drumActive['_last']=zone; }
    }
    if (currentMode==='popEverything' && !popGameOver) {
        for (let i = items.length-1; i >= 0; i--) {
            const it = items[i];
            if (isPointerDown && Math.hypot(p.x-it.x, p.y-it.y) < it.size*0.55) {
                playSound(400+Math.random()*600,'sine',0.08); items.splice(i,1); score++; break;
            }
        }
    }
});

canvas.addEventListener('pointerup', () => {
    isPointerDown = false; lastX = null; lastY = null; ctx.shadowBlur = 0;
    drumActive['_last'] = null;
    activeKeys['_lastKey'] = undefined;
    if (glowOsc) {
        glowGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
        setTimeout(()=>{ if(glowOsc){glowOsc.stop();glowOsc=null;} }, 120);
    }
});
canvas.addEventListener('pointerleave', () => { isPointerDown=false; lastX=null; lastY=null; });

// ═══════════════════════════════════════════════
//  MAIN ANIMATION LOOP  (all game rendering)
// ═══════════════════════════════════════════════
function animate() {
    if (!currentMode) return;

    if (currentMode==='abc') {
        ctx.fillStyle='black'; ctx.fillRect(0,0,canvas.width,canvas.height);
        const d=ABC_DATA[abcIndex]; ctx.textAlign='center';
        const S=Math.min(canvas.width,canvas.height);
        if (abcState==='letter') {
            ctx.fillStyle=`hsl(${(abcIndex/26)*360},100%,60%)`; ctx.font=`bold ${S*0.38}px Arial`;
            ctx.fillText(d.l, canvas.width/2, canvas.height/2+S*0.1);
            ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font=`${S*0.05}px Arial`;
            ctx.fillText('tap to see word', canvas.width/2, canvas.height-40);
        } else {
            ctx.fillStyle='white'; ctx.font=`bold ${S*0.07}px Arial`;
            ctx.fillText(`${d.l} is for...`, canvas.width/2, canvas.height/2-S*0.2);
            ctx.font=`${S*0.22}px Arial`; ctx.fillText(d.e, canvas.width/2, canvas.height/2);
            ctx.fillStyle='#ffd93d'; ctx.font=`bold ${S*0.1}px Arial`;
            ctx.fillText(d.w, canvas.width/2, canvas.height/2+S*0.18);
        }

    } else if (currentMode==='fruit') {
        ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (Math.random()<0.03) items.push({x:Math.random()*canvas.width, y:-50, v:3+Math.random()*3, char:['🍎','🍊','🍌','🍇','🍉'][Math.floor(Math.random()*5)]});
        ctx.font='80px Arial'; ctx.textAlign='center';
        ctx.fillText('🧺', basketX, canvas.height-50);
        for (let i=items.length-1;i>=0;i--) {
            const f=items[i]; f.y+=f.v; ctx.fillText(f.char,f.x,f.y);
            if (f.y>canvas.height-80 && Math.abs(f.x-basketX)<80) { playSound(600,'sine',0.1); items.splice(i,1); score++; }
            else if (f.y>canvas.height+10) { playSadSound(); spawnMiss(f.x); items.splice(i,1); }
        }
        drawMisses(); drawScore();

    } else if (currentMode==='snowflake') {
        const sg=ctx.createLinearGradient(0,0,0,canvas.height);
        sg.addColorStop(0,'#0d1b2a'); sg.addColorStop(1,'#1b2a4a');
        ctx.fillStyle=sg; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (Math.random()<0.04) items.push({x:Math.random()*canvas.width, y:-20, vy:1+Math.random()*2,
            drift:0, driftPhase:Math.random()*Math.PI*2, driftSpeed:0.02+Math.random()*0.02,
            size:20+Math.random()*30, noteIdx:Math.floor(Math.random()*8)});
        ctx.font='80px Arial'; ctx.textAlign='center';
        ctx.fillText('⛄', basketX, canvas.height-40);
        for (let i=items.length-1;i>=0;i--) {
            const f=items[i]; f.driftPhase+=f.driftSpeed; f.x+=Math.sin(f.driftPhase)*1.5; f.y+=f.vy;
            ctx.font=`${f.size}px Arial`; ctx.fillText('❄️',f.x,f.y);
            if (f.y>canvas.height-70 && Math.abs(f.x-basketX)<80) { playChime(f.noteIdx); items.splice(i,1); score++; }
            else if (f.y>canvas.height+20) { playSadSound(); spawnMiss(f.x); items.splice(i,1); }
        }
        drawMisses(); drawScore();

    } else if (currentMode==='butterfly') {
        const bg=ctx.createLinearGradient(0,0,0,canvas.height);
        bg.addColorStop(0,'#87CEEB'); bg.addColorStop(0.65,'#90EE90'); bg.addColorStop(1,'#228B22');
        ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (Math.random()<0.025 && items.length<8) {
            const onScreen = items.length < 3;
            const dir = Math.random()<0.5 ? 1 : -1;
            items.push({x:onScreen ? 80+Math.random()*(canvas.width-160) : (dir>0?-50:canvas.width+50),
                y:60+Math.random()*(canvas.height*0.55),
                vx:dir*(0.8+Math.random()*1.5), vy:0, wobble:Math.random()*Math.PI*2,
                wobbleSpeed:0.05+Math.random()*0.05, hue:Math.random()*360, size:44+Math.random()*20, caught:false, catchAnim:0});
        }
        ctx.textAlign='center';
        for (let i=items.length-1;i>=0;i--) {
            const b=items[i];
            if (b.caught) {
                b.catchAnim--; ctx.globalAlpha=b.catchAnim/20;
                ctx.font=`${b.size*(1+(20-b.catchAnim)*0.06)}px Arial`; ctx.fillText('🦋',b.x,b.y);
                if (b.catchAnim<=0) items.splice(i,1);
            } else {
                b.wobble+=b.wobbleSpeed; b.x+=b.vx; b.y+=Math.sin(b.wobble)*2.5;
                if (b.x<-80||b.x>canvas.width+80) { b.x=b.vx>0?-50:canvas.width+50; b.y=50+Math.random()*(canvas.height*0.6); }
                ctx.globalAlpha=1; ctx.font=`${b.size}px Arial`; ctx.fillText('🦋',b.x,b.y);
            }
        }
        ctx.globalAlpha=1; drawScore(true);

    } else if (currentMode==='cloudJumper') {
        const cg=ctx.createLinearGradient(0,0,0,canvas.height);
        cg.addColorStop(0,'#87CEEB'); cg.addColorStop(1,'#E0F4FF');
        ctx.fillStyle=cg; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.textAlign='center';
        for (let i=items.length-1;i>=0;i--) {
            const it=items[i];
            if (it.type==='cloud') {
                it.x+=it.v; if (it.x>canvas.width+150) it.x=-150;
                ctx.fillStyle='rgba(255,255,255,0.9)';
                ctx.beginPath(); ctx.ellipse(it.x,it.y,it.w/2,28,0,0,Math.PI*2);
                ctx.ellipse(it.x-it.w/4,it.y+12,it.w/3,22,0,0,Math.PI*2);
                ctx.ellipse(it.x+it.w/4,it.y+12,it.w/3,22,0,0,Math.PI*2); ctx.fill();
                if (Math.random()<0.02) items.push({type:'drop', x:it.x+(Math.random()-0.5)*it.w*0.6, y:it.y+30, vy:3+Math.random()*3});
            } else if (it.type==='drop') {
                it.y+=it.vy; ctx.font='45px Arial'; ctx.fillText('💧',it.x,it.y);
                if (it.y>canvas.height-20) { playSadSound(); spawnMiss(it.x); items.splice(i,1); }
            }
        }
        drawMisses(); drawScore(true);

    } else if (currentMode==='starCatcher') {
        ctx.fillStyle='black'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (Math.random()<0.05 && items.length<8) items.push({x:40+Math.random()*(canvas.width-80), y:40+Math.random()*(canvas.height-100), life:120});
        ctx.font='55px Arial'; ctx.textAlign='center';
        for (let i=items.length-1;i>=0;i--) {
            const s=items[i]; s.life--;
            if (s.life<=0) { items.splice(i,1); continue; }
            ctx.globalAlpha=Math.min(1,s.life/30); ctx.fillText('⭐',s.x,s.y);
        }
        ctx.globalAlpha=1; drawScore();

    } else if (currentMode==='rainbowSlide') {
        ctx.fillStyle=`hsl(${hue},100%,50%)`; ctx.fillRect(0,0,canvas.width,canvas.height);

    } else if (currentMode==='bubblePop') {
        ctx.fillStyle='white'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (Math.random()<0.04) items.push({x:Math.random()*canvas.width, y:canvas.height+50, r:40, v:2+Math.random()*3, h:Math.random()*360, char:['🦆','🐟','🐙','🐢'][Math.floor(Math.random()*4)], popped:false});
        ctx.textAlign='center';
        for (let i=items.length-1;i>=0;i--) {
            const b=items[i]; b.y-=b.v;
            if (!b.popped) { ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fillStyle=`hsla(${b.h},100%,60%,0.35)`; ctx.fill(); ctx.strokeStyle=`hsla(${b.h},80%,40%,0.6)`; ctx.lineWidth=2; ctx.stroke(); }
            ctx.font='40px Arial'; ctx.fillStyle='black'; ctx.fillText(b.char,b.x,b.y+15);
            if (b.y<-100) items.splice(i,1);
        }
        drawScore(true);

    } else if (currentMode==='mobilePiano') {
        const kh=canvas.height/8;
        const noteNames=['Do','Re','Mi','Fa','Sol','La','Si','Do↑'];
        for (let i=0;i<8;i++) {
            const lit=activeKeys[i]>0;
            ctx.fillStyle=lit?`hsl(${(i/8)*360},100%,55%)`:'#1a1a2e';
            ctx.fillRect(10, i*kh+6, canvas.width-20, kh-12);
            if (lit) activeKeys[i]--;
            ctx.fillStyle=lit?'white':'#555'; ctx.font=`bold ${Math.min(kh*0.35,32)}px Arial`;
            ctx.textAlign='center'; ctx.fillText(noteNames[i], canvas.width/2, i*kh+kh*0.65);
        }
        if (!isPointerDown) activeKeys['_lastKey']=undefined;

    } else if (currentMode==='bounce') {
        ctx.fillStyle='white'; ctx.fillRect(0,0,canvas.width,canvas.height);
        items.forEach(l => {
            l.vy+=0.5; l.y+=l.vy; l.x+=l.vx;
            if (l.y+l.size/2>canvas.height) { l.y=canvas.height-l.size/2; l.vy*=-0.7; }
            if (l.x<0||l.x>canvas.width) l.vx*=-1;
            ctx.fillStyle=`hsl(${l.hue},100%,50%)`; ctx.font=`bold ${l.size}px Arial`;
            ctx.textAlign='center'; ctx.fillText(l.char,l.x,l.y);
        });

    } else if (currentMode==='piano') {
        ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        const kw=canvas.width/26;
        for (let i=0;i<26;i++) {
            const c=String.fromCharCode(65+i), lit=activeKeys[c]>0;
            ctx.fillStyle=lit?`hsl(${(i/26)*360},100%,55%)`:'#222';
            ctx.fillRect(i*kw, canvas.height-120, kw-2, 120);
            ctx.fillStyle=lit?'white':'#777'; ctx.font=`bold ${Math.min(kw*0.65,18)}px Arial`;
            ctx.textAlign='center'; ctx.fillText(c, i*kw+kw/2, canvas.height-8);
            if (lit) activeKeys[c]--;
        }
        for (let i=items.length-1;i>=0;i--) {
            const p=items[i]; p.y+=p.vy; p.vy+=0.2; p.life-=0.012;
            if (p.life<=0) { items.splice(i,1); continue; }
            ctx.fillStyle=`hsla(${p.h},100%,65%,${p.life})`; ctx.font='bold 60px Arial';
            ctx.textAlign='center'; ctx.fillText(p.char,p.x,p.y);
        }

    } else if (currentMode==='fireworks') {
        ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        for (let i=items.length-1;i>=0;i--) {
            const it=items[i];
            if (it.type==='rocket') {
                it.x+=it.vx; it.y+=it.vy; it.life--;
                ctx.fillStyle=`hsl(${it.hue},100%,70%)`;
                ctx.beginPath(); ctx.arc(it.x,it.y,4,0,Math.PI*2); ctx.fill();
                if (Math.hypot(it.tx-it.x,it.ty-it.y)<12||it.life<=0) {
                    playSound(120+Math.random()*80,'square',0.15);
                    setTimeout(()=>playSound(300+Math.random()*300,'sine',0.3),60);
                    for (let j=0;j<45;j++) {
                        const ang=(j/45)*Math.PI*2, spd=2+Math.random()*6;
                        items.push({type:'particle', x:it.x, y:it.y,
                            vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
                            hue:it.hue+(Math.random()-0.5)*60, life:60+Math.random()*40, maxLife:90, size:3+Math.random()*4});
                    }
                    items.splice(i,1);
                }
            } else if (it.type==='particle') {
                it.vy+=0.12; it.x+=it.vx; it.y+=it.vy; it.vx*=0.97; it.vy*=0.97; it.life--;
                if (it.life<=0) { items.splice(i,1); continue; }
                ctx.globalAlpha=it.life/it.maxLife;
                ctx.fillStyle=`hsl(${it.hue},100%,65%)`;
                ctx.beginPath(); ctx.arc(it.x,it.y,it.size,0,Math.PI*2); ctx.fill();
                ctx.globalAlpha=1;
            }
        }
        ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.font='20px Arial'; ctx.textAlign='center';
        ctx.fillText('Tap to launch fireworks!', canvas.width/2, canvas.height-20);

    } else if (currentMode==='magicWand') {
        ctx.fillStyle='rgba(0,0,10,0.12)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.textAlign='center';
        for (let i=items.length-1;i>=0;i--) {
            const it=items[i]; it.life--;
            if (it.life<=0) { items.splice(i,1); continue; }
            if (it.type==='sparkle') {
                it.x+=it.vx; it.y+=it.vy; it.vy+=0.08; it.vx*=0.98;
                ctx.globalAlpha=it.life/it.maxLife;
                ctx.font=`${it.size}px Arial`; ctx.fillText(it.char,it.x,it.y);
            } else if (it.type==='butterfly') {
                it.wobble+=it.wobbleSpeed;
                it.x+=it.vx+Math.sin(it.wobble*2)*1.2; it.y+=it.vy+Math.sin(it.wobble)*1.5;
                ctx.globalAlpha=Math.min(1,it.life/30); ctx.font='28px Arial'; ctx.fillText('🦋',it.x,it.y);
            }
            ctx.globalAlpha=1;
        }
        if (!isPointerDown && items.length===0) {
            ctx.fillStyle='rgba(180,100,255,0.4)'; ctx.font='22px Arial';
            ctx.fillText('✨ Draw to cast your spell! ✨', canvas.width/2, canvas.height/2);
        }

    } else if (currentMode==='numberBounce') {
        ctx.fillStyle='#f8f0ff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (items.length===0) {
            ctx.fillStyle='#aaa'; ctx.font='22px Arial'; ctx.textAlign='center';
            ctx.fillText('Tap to make numbers bounce!', canvas.width/2, canvas.height/2);
        }
        items.forEach(l => {
            l.vy+=0.5; l.y+=l.vy; l.x+=l.vx;
            if (l.y+l.size/2>canvas.height) { l.y=canvas.height-l.size/2; l.vy*=-0.7; }
            if (l.x<0||l.x>canvas.width) l.vx*=-1;
            ctx.fillStyle=`hsl(${l.hue},100%,45%)`; ctx.font=`bold ${l.size}px Arial`;
            ctx.textAlign='center'; ctx.fillText(l.char,l.x,l.y);
        });

    } else if (currentMode==='colorMatch') {
        if (colorOptions.length===0) { animationId=requestAnimationFrame(animate); return; }
        const topH=canvas.height*0.35, boxY=topH+10;
        const boxW=canvas.width/2-10, boxH=(canvas.height-boxY-10)/2;
        ctx.fillStyle=colorOptions[colorTarget].fill;
        ctx.fillRect(0,0,canvas.width,topH);
        ctx.fillStyle='white'; ctx.textAlign='center';
        ctx.font=`${Math.min(canvas.width*0.06,30)}px Arial`;
        ctx.fillText('Tap the matching color!', canvas.width/2, topH*0.28);
        ctx.font=`bold ${Math.min(canvas.width*0.14,75)}px Arial`;
        ctx.fillText(colorOptions[colorTarget].name, canvas.width/2, topH*0.78);
        ctx.font='bold 32px Arial'; ctx.textAlign='right'; ctx.fillText(`⭐ ${score}`, canvas.width-15, topH-10);
        ctx.fillStyle='#eee'; ctx.fillRect(0,topH,canvas.width,canvas.height-topH);
        colorOptions.forEach((c,idx)=>{
            const col=idx%2, row=Math.floor(idx/2);
            const x=col*(boxW+20)+5, y=boxY+row*(boxH+10);
            let fill=c.fill;
            if (colorFeedback) {
                if (idx===colorTarget && colorFeedback.correct) fill='#44ff44';
                else if (idx===colorFeedback.tapped && !colorFeedback.correct) fill='#ff3333';
            }
            ctx.fillStyle=fill; drawRoundRect(x,y,boxW,boxH,16); ctx.fill();
            ctx.fillStyle='rgba(0,0,0,0.3)'; drawRoundRect(x,y,boxW,boxH,16); ctx.lineWidth=3; ctx.stroke();
            ctx.fillStyle='white'; ctx.font=`bold ${Math.min(boxH*0.2,28)}px Arial`;
            ctx.textAlign='center'; ctx.fillText(c.name, x+boxW/2, y+boxH/2+10);
        });

    } else if (currentMode==='drumKit') {
        ctx.fillStyle='#111'; ctx.fillRect(0,0,canvas.width,canvas.height);
        DRUM_ZONES.forEach(z=>{
            const lit=(drumActive[z.zone]||0)>0;
            const x=z.x*canvas.width, y=z.y*canvas.height, w=z.w*canvas.width, h=z.h*canvas.height;
            ctx.fillStyle=lit?z.color:'#1e1e2e';
            drawRoundRect(x+5,y+5,w-10,h-10,14); ctx.fill();
            ctx.strokeStyle=lit?'rgba(255,255,255,0.8)':'#333'; ctx.lineWidth=3;
            drawRoundRect(x+5,y+5,w-10,h-10,14); ctx.stroke();
            const em=Math.min(w,h)*0.32;
            ctx.font=`${em}px Arial`; ctx.textAlign='center';
            ctx.fillStyle=lit?'white':'#555';
            ctx.fillText(z.emoji, x+w/2, y+h/2-4);
            ctx.font=`bold ${Math.min(w*0.1,h*0.16,22)}px Arial`;
            ctx.fillText(z.label, x+w/2, y+h-14);
            if (lit) drumActive[z.zone]--;
        });

    } else if (currentMode==='songBuilder' && songGrid) {
        ctx.fillStyle='#111'; ctx.fillRect(0,0,canvas.width,canvas.height);
        const now=performance.now();
        if (now-songLastTime>SONG_MS) {
            songLastTime=now;
            for (let row=0;row<8;row++) if (songGrid[songStep][row]) playSound(SONG_NOTES[7-row],'sine',0.28);
            songStep=(songStep+1)%8;
        }
        const cellW=(canvas.width-40)/8, cellH=(canvas.height-80)/8, sx=20, sy=60;
        ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fillRect(sx+songStep*cellW, sy, cellW, cellH*8);
        for (let col=0;col<8;col++) for (let row=0;row<8;row++) {
            const x=sx+col*cellW, y=sy+row*cellH, active=songGrid[col][row], cur=col===songStep;
            ctx.fillStyle=active?`hsl(${(7-row)/8*360},100%,${cur?70:50}%)`:cur?'#2a2a2a':'#1a1a1a';
            ctx.fillRect(x+2,y+2,cellW-4,cellH-4);
            if (active&&cur) { ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.strokeRect(x+2,y+2,cellW-4,cellH-4); }
        }
        ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='13px Arial'; ctx.textAlign='center';
        ctx.fillText('🎵 Tap cells to build your song!', canvas.width/2, 40);

    } else if (currentMode==='frogJump') {
        const fg=ctx.createLinearGradient(0,0,0,canvas.height);
        fg.addColorStop(0,'#87CEEB'); fg.addColorStop(0.55,'#90EE90'); fg.addColorStop(1,'#2d5a27');
        ctx.fillStyle=fg; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle='rgba(0,80,180,0.25)'; ctx.fillRect(0,canvas.height*0.78,canvas.width,canvas.height*0.22);
        const frogX=canvas.width/2, frogY=canvas.height-75;
        if (items.length<8&&Math.random()<0.02) items.push({
            x:Math.random()*canvas.width, y:40+Math.random()*(canvas.height*0.65),
            vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*2,
            wobble:Math.random()*Math.PI*2, wobbleSpeed:0.08+Math.random()*0.05
        });
        if (frogTongue) {
            const tipX=frogX+(frogTongue.tx-frogX)*frogTongue.progress;
            const tipY=(frogY-20)+(frogTongue.ty-(frogY-20))*frogTongue.progress;
            if (frogTongue.phase==='extend') {
                frogTongue.progress+=0.07;
                for (let i=items.length-1;i>=0;i--) {
                    if (Math.hypot(items[i].x-tipX,items[i].y-tipY)<38) {
                        playSound(280,'sine',0.1); setTimeout(()=>playSound(180,'sine',0.15),60);
                        items.splice(i,1); score++; frogTongue.phase='retract'; break;
                    }
                }
                if (frogTongue.progress>=1) frogTongue.phase='retract';
            } else { frogTongue.progress-=0.07; if (frogTongue.progress<=0) frogTongue=null; }
            if (frogTongue) {
                const cx=frogX+(frogTongue.tx-frogX)*frogTongue.progress;
                const cy=(frogY-20)+(frogTongue.ty-(frogY-20))*frogTongue.progress;
                ctx.beginPath(); ctx.strokeStyle='#ff1493'; ctx.lineWidth=7; ctx.lineCap='round';
                ctx.moveTo(frogX,frogY-20); ctx.lineTo(cx,cy); ctx.stroke();
                ctx.fillStyle='#ff1493'; ctx.beginPath(); ctx.arc(cx,cy,9,0,Math.PI*2); ctx.fill();
            }
        }
        ctx.textAlign='center';
        items.forEach(f => {
            f.wobble+=f.wobbleSpeed;
            f.x+=f.vx+Math.sin(f.wobble)*0.8; f.y+=f.vy+Math.cos(f.wobble*0.7)*0.8;
            if (f.x<20) f.vx=Math.abs(f.vx); if (f.x>canvas.width-20) f.vx=-Math.abs(f.vx);
            if (f.y<20) f.vy=Math.abs(f.vy); if (f.y>canvas.height*0.72) f.vy=-Math.abs(f.vy);
            ctx.font='35px Arial'; ctx.fillText('🪰',f.x,f.y);
        });
        ctx.font='62px Arial'; ctx.fillText('🐸',frogX,frogY);
        drawScore(true);
        if (!frogTongue) {
            ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.font='18px Arial';
            ctx.fillText('Tap to catch flies!', canvas.width/2, canvas.height-15);
        }

    } else if (currentMode==='popEverything') {
        ctx.fillStyle='#fff8f0'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (!popGameOver) {
            const elapsed=performance.now()-popStartTime, timeLeft=Math.max(0,30000-elapsed);
            if (timeLeft===0) popGameOver=true;
            if (items.length<22) items.push({
                x:30+Math.random()*(canvas.width-60), y:30+Math.random()*(canvas.height-100),
                vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5,
                char:POP_CHARS[Math.floor(Math.random()*POP_CHARS.length)], size:48+Math.random()*28
            });
            ctx.textAlign='center';
            items.forEach(it => {
                it.x+=it.vx; it.y+=it.vy;
                if (it.x<30||it.x>canvas.width-30) it.vx*=-1;
                if (it.y<30||it.y>canvas.height-60) it.vy*=-1;
                ctx.font=`${it.size}px Arial`; ctx.fillText(it.char,it.x,it.y);
            });
            const secs=Math.ceil(timeLeft/1000);
            ctx.font='bold 42px Arial'; ctx.textAlign='right';
            ctx.fillStyle=secs<=5?'#ff4444':'#333';
            ctx.fillText(`⏱ ${secs}`, canvas.width-15, 52);
            drawScore(true);
        } else {
            ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.textAlign='center';
            ctx.font=`bold ${Math.min(canvas.width*0.09,55)}px Arial`; ctx.fillStyle='white';
            ctx.fillText('🎉 Time\'s Up! 🎉', canvas.width/2, canvas.height/2-90);
            ctx.font=`bold ${Math.min(canvas.width*0.22,130)}px Arial`;
            ctx.fillText(score, canvas.width/2, canvas.height/2+20);
            ctx.font=`${Math.min(canvas.width*0.07,40)}px Arial`;
            ctx.fillText('pops! 💥', canvas.width/2, canvas.height/2+80);
        }
    }

    // ── Memory Match ──────────────────────────────────────────────────
    if (currentMode==='memoryMatch') {
        ctx.fillStyle='#f0f4ff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle='#2D1B69'; ctx.textAlign='center';
        ctx.font=`bold ${Math.min(canvas.width*0.05,22)}px Arial`;
        ctx.fillText(`🃏 Memory Match  ✅ ${memMatched} / ${memCards.length/2}`, canvas.width/2, 52);
        memCards.forEach(c => {
            const r=12;
            ctx.fillStyle = c.matched ? 'rgba(76,175,80,0.2)' : c.flipped ? '#fff' : '#7C5CBF';
            drawRoundRect(c.x,c.y,c.w,c.h,r); ctx.fill();
            ctx.strokeStyle = c.matched ? '#4CAF50' : c.flipped ? '#a29bfe' : '#5a3aa0';
            ctx.lineWidth=2.5; drawRoundRect(c.x,c.y,c.w,c.h,r); ctx.stroke();
            ctx.textAlign='center';
            if (c.flipped||c.matched) {
                ctx.font=`${Math.min(c.w,c.h)*0.48}px Arial`;
                ctx.fillText(c.emoji, c.x+c.w/2, c.y+c.h/2+Math.min(c.w,c.h)*0.17);
            } else {
                ctx.fillStyle='rgba(255,255,255,0.22)';
                ctx.font=`bold ${Math.min(c.w,c.h)*0.4}px Arial`;
                ctx.fillText('?', c.x+c.w/2, c.y+c.h/2+Math.min(c.w,c.h)*0.14);
            }
        });
        if (memMatched>0 && memMatched===memCards.length/2) {
            ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle='white'; ctx.textAlign='center';
            ctx.font=`bold ${Math.min(canvas.width*0.1,58)}px Arial`;
            ctx.fillText('🎉 You Won! 🎉', canvas.width/2, canvas.height/2-50);
            ctx.font=`${Math.min(canvas.width*0.055,34)}px Arial`;
            ctx.fillText(`${memMatched} pairs matched!`, canvas.width/2, canvas.height/2+20);
            ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font=`${Math.min(canvas.width*0.042,26)}px Arial`;
            ctx.fillText('Press Menu to play again', canvas.width/2, canvas.height/2+70);
        }

    // ── Animal Sounds ─────────────────────────────────────────────────
    } else if (currentMode==='animalSound') {
        const a = ANIMALS[animalIdx];
        ctx.fillStyle='#fff8f0'; ctx.fillRect(0,0,canvas.width,canvas.height);
        const S=Math.min(canvas.width,canvas.height);
        ctx.font=`${S*0.32}px Arial`; ctx.textAlign='center';
        ctx.fillText(a.e, canvas.width/2, canvas.height*0.45);
        ctx.fillStyle='#2D1B69'; ctx.font=`bold ${S*0.09}px Arial`;
        ctx.fillText(a.n, canvas.width/2, canvas.height*0.63);
        ctx.fillStyle='#7C5CBF'; ctx.font=`${S*0.063}px Arial`;
        ctx.fillText(`"${a.s}"`, canvas.width/2, canvas.height*0.75);
        ctx.fillStyle='rgba(45,27,105,0.32)'; ctx.font=`${S*0.038}px Arial`;
        ctx.fillText('Tap to hear · Tap again to next animal', canvas.width/2, canvas.height-30);
        ctx.fillStyle='#aaa'; ctx.font=`${S*0.036}px Arial`;
        ctx.fillText(`${animalIdx+1} / ${ANIMALS.length}`, canvas.width/2, 48);

    // ── Shape Match ───────────────────────────────────────────────────
    } else if (currentMode==='shapeMatch') {
        ctx.fillStyle='#f8f0ff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (shapeOptions.length===0) { animationId=requestAnimationFrame(animate); return; }
        const tShape=shapeOptions[shapeTarget];
        ctx.fillStyle='#2D1B69'; ctx.textAlign='center';
        ctx.font=`bold ${Math.min(canvas.width*0.055,28)}px Arial`;
        ctx.fillText('Find the shape!', canvas.width/2, 46);
        const tS=Math.min(canvas.width*0.22, canvas.height*0.22, 110);
        drawShape(tShape, canvas.width/2, canvas.height*0.22, tS, '#7C5CBF');
        ctx.fillStyle='#7C5CBF'; ctx.font=`bold ${Math.min(canvas.width*0.065,32)}px Arial`;
        ctx.fillText(tShape, canvas.width/2, canvas.height*0.37);
        const boxW=canvas.width/2-16, boxH=(canvas.height*0.55)/2-12, startY=canvas.height*0.41;
        const SC=['#FF6B9D','#4BC8A4','#FFC83D','#5BA4F5'];
        for (let i=0;i<4;i++) {
            const bx=8+(i%2)*(boxW+16), by=startY+Math.floor(i/2)*(boxH+12);
            let fill=SC[i];
            if (shapeFeedback) {
                if (i===shapeTarget) fill='#44ee44';
                else if (i===shapeFeedback.tapped&&!shapeFeedback.correct) fill='#ff4444';
            }
            drawRoundRect(bx,by,boxW,boxH,14); ctx.fillStyle=fill; ctx.fill();
            drawShape(shapeOptions[i], bx+boxW/2, by+boxH/2, Math.min(boxW,boxH)*0.44, 'white');
        }
        drawScore(true);

    // ── Math Fun ──────────────────────────────────────────────────────
    } else if (currentMode==='mathFun') {
        ctx.fillStyle='#f0fff4'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (!mathProblem) { animationId=requestAnimationFrame(animate); return; }
        const eq=`${mathProblem.a} ${mathProblem.op} ${mathProblem.b} = ?`;
        ctx.fillStyle='#2D1B69'; ctx.textAlign='center';
        ctx.font=`bold ${Math.min(canvas.width*0.13,78)}px Arial`;
        ctx.fillText(eq, canvas.width/2, canvas.height*0.38);
        if (mathProblem.a<=10 && mathProblem.b<=10 && mathProblem.op==='+') {
            const sp=18, ds=11;
            const aw=mathProblem.a*sp, bw=mathProblem.b*sp;
            ctx.fillStyle='#FF6B9D';
            for (let d=0;d<mathProblem.a;d++) { ctx.beginPath(); ctx.arc(canvas.width/2-aw/2+d*sp+sp/2, canvas.height*0.52, ds, 0, Math.PI*2); ctx.fill(); }
            ctx.fillStyle='#5BA4F5';
            for (let d=0;d<mathProblem.b;d++) { ctx.beginPath(); ctx.arc(canvas.width/2-bw/2+d*sp+sp/2, canvas.height*0.59, ds, 0, Math.PI*2); ctx.fill(); }
        }
        const boxW=canvas.width/3-14, by=canvas.height*0.72;
        const BC=['#FF6B9D','#4BC8A4','#FFC83D'];
        for (let i=0;i<3;i++) {
            const bx=8+i*(boxW+12);
            let fill=BC[i];
            if (mathFeedback) {
                if (mathOptions[i]===mathProblem.ans) fill='#44ee44';
                else if (i===mathFeedback.tapped&&!mathFeedback.correct) fill='#ff4444';
            }
            drawRoundRect(bx,by,boxW,80,16); ctx.fillStyle=fill; ctx.fill();
            ctx.fillStyle='white'; ctx.font=`bold ${Math.min(80*0.5,42)}px Arial`;
            ctx.textAlign='center'; ctx.fillText(mathOptions[i], bx+boxW/2, by+52);
        }
        drawScore(true);

    // ── Word Match ────────────────────────────────────────────────────
    } else if (currentMode==='wordMatch') {
        ctx.fillStyle='#fff9f0'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (wordOptions.length===0) { animationId=requestAnimationFrame(animate); return; }
        const tWord=wordOptions[wordTarget];
        const S=Math.min(canvas.width,canvas.height);
        ctx.font=`${S*0.26}px Arial`; ctx.textAlign='center';
        ctx.fillText(tWord.e, canvas.width/2, canvas.height*0.3);
        ctx.fillStyle='#2D1B69'; ctx.font=`bold ${Math.min(canvas.width*0.048,24)}px Arial`;
        ctx.fillText('What is this called?', canvas.width/2, canvas.height*0.44);
        const boxW=canvas.width/2-16, startY=canvas.height*0.48;
        const boxH=(canvas.height*0.48)/2-12;
        const WC=['#FF6B9D','#4BC8A4','#FFC83D','#5BA4F5'];
        for (let i=0;i<4;i++) {
            const bx=8+(i%2)*(boxW+16), by=startY+Math.floor(i/2)*(boxH+12);
            let fill=WC[i];
            if (wordFeedback) {
                if (i===wordTarget) fill='#44ee44';
                else if (i===wordFeedback.tapped&&!wordFeedback.correct) fill='#ff4444';
            }
            drawRoundRect(bx,by,boxW,boxH,14); ctx.fillStyle=fill; ctx.fill();
            ctx.fillStyle='white';
            ctx.font=`bold ${Math.min(boxH*0.36,boxW*0.14,24)}px Arial`;
            ctx.textAlign='center'; ctx.fillText(wordOptions[i].w, bx+boxW/2, by+boxH/2+8);
        }
        drawScore(true);

    // ── Balloon Numbers ───────────────────────────────────────────────
    } else if (currentMode==='balloonPop') {
        const bg=ctx.createLinearGradient(0,0,0,canvas.height);
        bg.addColorStop(0,'#87CEEB'); bg.addColorStop(1,'#E0F4FF');
        ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
        const existing=new Set(items.map(b=>b.num));
        for (let n=1;n<=10;n++) {
            if (!existing.has(n) && Math.random()<0.018) {
                items.push({num:n, x:40+Math.random()*(canvas.width-80), y:canvas.height+60,
                    vy:1.2+Math.random()*0.8, r:36+Math.random()*14, hue:(n/10)*360, shake:0});
            }
        }
        ctx.fillStyle='#2D1B69'; ctx.textAlign='center';
        ctx.font=`bold ${Math.min(canvas.width*0.055,28)}px Arial`;
        ctx.fillText(`Pop number: ${balloonTarget}`, canvas.width/2, 50);
        for (let n=1;n<=10;n++) {
            ctx.fillStyle = n<balloonTarget ? '#7C5CBF' : 'rgba(124,92,191,0.18)';
            ctx.beginPath(); ctx.arc(canvas.width/2-99+n*20,72,8,0,Math.PI*2); ctx.fill();
        }
        ctx.textAlign='center';
        for (let i=items.length-1;i>=0;i--) {
            const b=items[i]; b.y-=b.vy;
            if (b.shake>0) b.shake--;
            const sx=b.shake>0 ? Math.sin(b.shake*1.8)*4 : 0;
            if (b.y<-80) { items.splice(i,1); continue; }
            ctx.beginPath(); ctx.arc(b.x+sx,b.y,b.r,0,Math.PI*2);
            ctx.fillStyle=`hsla(${b.hue},80%,60%,0.88)`; ctx.fill();
            ctx.strokeStyle=`hsla(${b.hue},80%,40%,0.7)`; ctx.lineWidth=2; ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1.5;
            ctx.moveTo(b.x+sx,b.y+b.r); ctx.lineTo(b.x+sx,b.y+b.r+28); ctx.stroke();
            ctx.fillStyle='white'; ctx.font=`bold ${b.r*0.9}px Arial`;
            ctx.fillText(b.num, b.x+sx, b.y+b.r*0.36);
        }
        drawScore(true);

    // ── Color Mix ─────────────────────────────────────────────────────
    } else if (currentMode==='colorMix') {
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if (!mixQ) { animationId=requestAnimationFrame(animate); return; }
        ctx.fillStyle='#2D1B69'; ctx.textAlign='center';
        ctx.font=`bold ${Math.min(canvas.width*0.052,26)}px Arial`;
        ctx.fillText('🎨 Mix the colors!', canvas.width/2, 46);
        const sw=Math.min(canvas.width*0.22,100), cy=canvas.height*0.3;
        ctx.fillStyle=mixQ.ac;
        drawRoundRect(canvas.width/2-sw*1.5-16, cy-sw/2, sw, sw, 14); ctx.fill();
        ctx.fillStyle='#333'; ctx.font=`bold ${Math.min(sw*0.22,16)}px Arial`;
        ctx.fillText(mixQ.a, canvas.width/2-sw-16, cy+sw/2+22);
        ctx.fillStyle='#2D1B69'; ctx.font=`bold ${Math.min(canvas.width*0.08,40)}px Arial`;
        ctx.fillText('+', canvas.width/2, cy+14);
        ctx.fillStyle=mixQ.bc;
        drawRoundRect(canvas.width/2+16, cy-sw/2, sw, sw, 14); ctx.fill();
        ctx.fillStyle='#333'; ctx.font=`bold ${Math.min(sw*0.22,16)}px Arial`;
        ctx.fillText(mixQ.b, canvas.width/2+sw/2+16, cy+sw/2+22);
        ctx.fillStyle='#2D1B69'; ctx.font=`bold ${Math.min(canvas.width*0.072,36)}px Arial`;
        ctx.textAlign='center'; ctx.fillText('= ?', canvas.width/2, cy+sw/2+64);
        ctx.font=`bold ${Math.min(canvas.width*0.046,24)}px Arial`;
        ctx.fillText('What color do you get?', canvas.width/2, canvas.height*0.64);
        const boxW=canvas.width/3-14, by=canvas.height*0.69;
        for (let i=0;i<3;i++) {
            const opt=mixQ.options[i], bx=8+i*(boxW+12);
            let fill=opt.color;
            if (mixFeedback) {
                if (i===mixQ.correctIdx) fill='#44ee44';
                else if (i===mixFeedback.tapped&&!mixFeedback.correct) fill='#ff4444';
            }
            drawRoundRect(bx,by,boxW,90,14); ctx.fillStyle=fill; ctx.fill();
            ctx.fillStyle='white'; ctx.font=`bold ${Math.min(90*0.3,24)}px Arial`;
            ctx.textAlign='center'; ctx.fillText(opt.label, bx+boxW/2, by+56);
        }
        drawScore(true);
    }

    animationId = requestAnimationFrame(animate);
}

// ═══════════════════════════════════════════════
//  KEYBOARD (Desktop Piano + Letter Bounce)
// ═══════════════════════════════════════════════
window.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (currentMode==='bounce') {
        const c=e.key.toUpperCase(); if (c.length!==1) return;
        playSound(400); items.push({char:c, x:Math.random()*canvas.width, y:-50, vy:5, vx:(Math.random()-0.5)*6, size:90, hue:Math.random()*360});
    }
    if (currentMode==='piano') {
        const c=e.key.toUpperCase(); if (c.length!==1||c<'A'||c>'Z') return;
        const idx=c.charCodeAt(0)-65; playSound(261.63*Math.pow(1.059,idx)); activeKeys[c]=15;
        items.push({x:idx*(canvas.width/26)+canvas.width/52, y:canvas.height-150, char:c, vy:-10, life:1, h:(idx/26)*360});
    }
});

// ═══════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════
window.addEventListener('resize', () => {
    const isPaint = currentMode==='paint'||currentMode==='glow';
    let saved = null;
    if (isPaint) { try { saved=ctx.getImageData(0,0,canvas.width,canvas.height); } catch(e){} }
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    if (isPaint && saved) ctx.putImageData(saved,0,0);
    else if (currentMode) clearCanvas();
    if (currentMode==='fruit'||currentMode==='snowflake') basketX=canvas.width/2;
});

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
</script>
</body>
