<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alaina's Game World</title>
    <style>
        :root { --bg: #fdfcf0; --primary: #ff6b6b; --secondary: #4ecdc4; --tertiary: #ffd93d; --phone: #a29bfe; --abc: #ff9f43; --star: #48dbfb; --fruit: #81ecec; --glow: #2ecc71; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Arial Rounded MT Bold', sans-serif; background-color: var(--bg); }
        
        /* THE FIX: Game container starts hidden and pointer-events are disabled until a game starts */
        #game-container { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 5;
        }

        canvas { display: block; touch-action: none; background: #fff; width: 100%; height: 100%; }

        #hub { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            height: 100vh; 
            overflow-y: auto; 
            box-sizing: border-box;
            position: relative;
            z-index: 10; /* Ensures buttons are on top */
        }

        .section-title { font-size: 1.2rem; color: #666; margin-top: 25px; text-transform: uppercase; letter-spacing: 2px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; width: 100%; max-width: 900px; margin-top: 15px; }
        
        .menu-btn { 
            padding: 20px; 
            font-size: 16px; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: transform 0.1s; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.1); 
            color: white; 
            font-weight: bold; 
            -webkit-tap-highlight-color: transparent; 
        }
        .menu-btn:active { transform: scale(0.95); }

        #back-btn, #clear-btn { 
            position: fixed; 
            padding: 12px 20px; 
            background: white; 
            border: 3px solid #333; 
            border-radius: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            z-index: 100; 
            display: none; 
        }
        #back-btn { top: 15px; left: 15px; }
        #clear-btn { top: 15px; right: 15px; background: #ffeb3b; }
    </style>
</head>
<body>

    <div id="hub">
        <h1 style="text-align: center; color: #333; margin-top: 10px;">🌟 ALAINA'S WORLD 🌟</h1>
        
        <p class="section-title">Computer Games</p>
        <div class="game-grid">
            <button class="menu-btn" style="background:var(--primary)" onclick="startGame('paint')">🎨 Magic Painter</button>
            <button class="menu-btn" style="background:var(--secondary)" onclick="startGame('bounce')">🎈 Letter Bounce</button>
            <button class="menu-btn" style="background:var(--tertiary); color:#333" onclick="startGame('piano')">🎹 Desktop Piano</button>
        </div>

        <p class="section-title">Phone & Tablet Games</p>
        <div class="game-grid">
            <button class="menu-btn" style="background:var(--glow)" onclick="startGame('glow')">✨ Paint Glow</button>
            <button class="menu-btn" style="background:var(--abc)" onclick="startGame('abc')">🔤 Talking ABC</button>
            <button class="menu-btn" style="background:var(--fruit)" onclick="startGame('fruit')">🍎 Catch Fruit</button>
            <button class="menu-btn" style="background:var(--star)" onclick="startGame('starCatcher')">⭐ Star Catcher</button>
            <button class="menu-btn" style="background:var(--secondary)" onclick="startGame('rainbowSlide')">🌈 Rainbow Slide</button>
            <button class="menu-btn" style="background:var(--phone)" onclick="startGame('bubblePop')">🫧 Bubble Rescue</button>
            <button class="menu-btn" style="background:var(--phone)" onclick="startGame('mobilePiano')">📱 Phone Piano</button>
        </div>
    </div>

    <button id="back-btn" onclick="goHome()">🏠 Menu</button>
    <button id="clear-btn" onclick="clearCanvas()">🧹 Clear</button>
    <div id="game-container"><canvas id="mainCanvas"></canvas></div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const hub = document.getElementById('hub');
    const container = document.getElementById('game-container');
    const backBtn = document.getElementById('back-btn');
    const clearBtn = document.getElementById('clear-btn');

    let currentMode, animationId, audioCtx, items = [], activeKeys = {}, hue = 0;
    let lastX = null, lastY = null, abcIndex = 0, abcState = "letter", basketX = 0;
    let glowOsc = null, glowGain = null;

    const abcData = [
        { l: 'A', w: 'Apple', e: '🍎' }, { l: 'B', w: 'Ball', e: '⚽' }, { l: 'C', w: 'Cat', e: '🐱' },
        { l: 'D', w: 'Dog', e: '🐶' }, { l: 'E', w: 'Elephant', e: '🐘' }, { l: 'F', w: 'Fish', e: '🐟' },
        { l: 'G', w: 'Grapes', e: '🍇' }, { l: 'H', w: 'Hat', e: '🎩' }, { l: 'I', w: 'Ice Cream', e: '🍦' },
        { l: 'J', w: 'Juice', e: '🥤' }, { l: 'K', w: 'Kite', e: '🪁' }, { l: 'L', w: 'Lion', e: '🦁' },
        { l: 'M', w: 'Monkey', e: '🐵' }, { l: 'N', w: 'Nose', e: '👃' }, { l: 'O', w: 'Orange', e: '🍊' },
        { l: 'P', w: 'Pig', e: '🐷' }, { l: 'Q', w: 'Queen', e: '👸' }, { l: 'R', w: 'Rabbit', e: '🐰' },
        { l: 'S', w: 'Sun', e: '☀️' }, { l: 'T', w: 'Tiger', e: '🐯' }, { l: 'U', w: 'Umbrella', e: '☂️' },
        { l: 'V', w: 'Van', e: '🚐' }, { l: 'W', w: 'Watch', e: '⌚' }, { l: 'X', w: 'Xylophone', e: '🎹' },
        { l: 'Y', w: 'Yo-Yo', e: '🪀' }, { l: 'Z', w: 'Zebra', e: '🦓' }
    ];

    function unlockAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function startGame(m) {
        unlockAudio();
        hub.style.display = 'none';
        container.style.display = 'block';
        backBtn.style.display = 'block';
        clearBtn.style.display = (m === 'paint' || m === 'glow') ? 'block' : 'none';
        
        currentMode = m; items = []; abcIndex = 0; abcState = "letter"; basketX = canvas.width / 2;
        clearCanvas();
        animate();
    }

    function goHome() {
        cancelAnimationFrame(animationId);
        window.speechSynthesis.cancel();
        if (glowOsc) { try { glowOsc.stop(); } catch(e) {} glowOsc = null; }
        
        currentMode = null;
        hub.style.display = 'flex';
        container.style.display = 'none';
        backBtn.style.display = 'none';
        clearBtn.style.display = 'none';
    }

    function playSound(f, t = 'sine', d = 0.4) {
        if (!audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    canvas.addEventListener('pointerdown', (e) => {
        unlockAudio();
        if (currentMode === 'abc' && abcState === "letter") {
            const d = abcData[abcIndex]; abcState = "word"; 
            const u = new SpeechSynthesisUtterance(`${d.l} is for ${d.w}`);
            u.pitch = 1.3; window.speechSynthesis.speak(u);
            setTimeout(() => { if(currentMode === 'abc') { abcIndex = (abcIndex + 1) % 26; abcState = "letter"; } }, 3000);
        }
        if (currentMode === 'bubblePop') {
            items.forEach((b, i) => { if (Math.hypot(e.clientX - b.x, e.clientY - b.y) < b.r) { playSound(900, 'sine', 0.1); b.popped = true; b.v = -5; } });
        }
        if (currentMode === 'starCatcher') {
            items.forEach((s, i) => { if (Math.hypot(e.clientX - s.x, e.clientY - s.y) < 60) { playSound(1200, 'sine', 0.1); items.splice(i, 1); } });
        }
        if (currentMode === 'mobilePiano') {
            const idx = Math.floor(e.clientY / (canvas.height / 8));
            playSound(261.63 * Math.pow(1.059, idx * 3)); activeKeys[idx] = 10;
        }
        if (currentMode === 'glow') {
            glowOsc = audioCtx.createOscillator(); glowGain = audioCtx.createGain();
            glowOsc.type = 'sine'; glowGain.gain.setValueAtTime(0, audioCtx.currentTime);
            glowGain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
            glowOsc.connect(glowGain); glowGain.connect(audioCtx.destination); glowOsc.start();
        }
    });

    canvas.addEventListener('pointermove', (e) => {
        if (currentMode === 'paint' || currentMode === 'glow') {
            if (lastX === null) { lastX = e.clientX; lastY = e.clientY; return; }
            ctx.beginPath(); ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
            if (currentMode === 'glow') { ctx.shadowBlur = 15; ctx.shadowColor = ctx.strokeStyle; ctx.lineWidth = 20; if(glowOsc) glowOsc.frequency.setTargetAtTime(200 + (canvas.height - e.clientY), audioCtx.currentTime, 0.05); }
            else { ctx.lineWidth = 30; ctx.shadowBlur = 0; }
            ctx.lineCap = 'round'; ctx.moveTo(lastX, lastY); ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
            lastX = e.clientX; lastY = e.clientY; hue = (hue + 4) % 360;
        }
        if (currentMode === 'rainbowSlide') { hue = (e.clientY / canvas.height) * 360; playSound(200 + (canvas.height - e.clientY), 'sine', 0.05); }
        if (currentMode === 'fruit') basketX = e.clientX;
    });

    canvas.addEventListener('pointerup', () => { 
        lastX = null; ctx.shadowBlur = 0; 
        if (glowOsc) { glowGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05); setTimeout(() => { if (glowOsc) { glowOsc.stop(); glowOsc = null; } }, 100); }
    });

    function clearCanvas() {
        ctx.fillStyle = (currentMode === 'piano' || currentMode === 'mobilePiano' || currentMode === 'abc' || currentMode === 'starCatcher' || currentMode === 'fruit' || currentMode === 'glow') ? '#000' : '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height); items = [];
    }

    function animate() {
        if (!currentMode) return;
        if (currentMode === 'abc') {
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,canvas.width,canvas.height);
            const d = abcData[abcIndex]; ctx.textAlign = "center";
            if (abcState === "letter") { ctx.fillStyle = `hsl(${(abcIndex/26)*360}, 100%, 60%)`; ctx.font = "bold 200px Arial"; ctx.fillText(d.l, canvas.width/2, canvas.height/2); }
            else { ctx.fillStyle = "white"; ctx.font = "bold 60px Arial"; ctx.fillText(`${d.l} is for...`, canvas.width/2, canvas.height/2 - 120); ctx.font = "120px Arial"; ctx.fillText(d.e, canvas.width/2, canvas.height/2); ctx.fillStyle = "#ffd93d"; ctx.font = "bold 80px Arial"; ctx.fillText(d.w, canvas.width/2, canvas.height/2 + 120); }
        } else if (currentMode === 'fruit') {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            if (Math.random() < 0.03) items.push({ x: Math.random()*canvas.width, y: -50, v: 4, char: ['🍎', '🍊', '🍌', '🍇', '🍉'][Math.floor(Math.random()*5)] });
            ctx.font = "80px Arial"; ctx.textAlign = "center"; ctx.fillText("🧺", basketX, canvas.height - 50);
            items.forEach((f, i) => { f.y += f.v; ctx.fillText(f.char, f.x, f.y); if (f.y > canvas.height - 80 && Math.abs(f.x - basketX) < 60) { playSound(600, 'sine', 0.1); items.splice(i, 1); } else if (f.y > canvas.height) items.splice(i, 1); });
        } else if (currentMode === 'starCatcher') {
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,canvas.width,canvas.height);
            if (Math.random() < 0.05 && items.length < 6) items.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, life: 100 });
            items.forEach((s, i) => { s.life--; if (s.life <= 0) items.splice(i, 1); ctx.font = "50px Arial"; ctx.fillText("⭐", s.x, s.y); });
        } else if (currentMode === 'rainbowSlide') { ctx.fillStyle = `hsl(${hue}, 100%, 50%)`; ctx.fillRect(0,0,canvas.width,canvas.height); 
        } else if (currentMode === 'bubblePop') {
            ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
            if (Math.random() < 0.04) items.push({ x: Math.random()*canvas.width, y: canvas.height+50, r: 40, v: 4, h: Math.random()*360, char: ['🦆', '🐟', '🐙', '🐢'][Math.floor(Math.random()*4)], popped: false });
            items.forEach((b, i) => { b.y -= b.v; if (!b.popped) { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle = `hsla(${b.h}, 100%, 50%, 0.4)`; ctx.fill(); ctx.stroke(); } ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(b.char, b.x, b.y + 15); if (b.y < -100) items.splice(i, 1); });
        } else if (currentMode === 'mobilePiano') {
            const kh = canvas.height / 8;
            for(let i=0; i<8; i++) { ctx.fillStyle = activeKeys[i] > 0 ? `hsl(${(i/8)*360}, 100%, 50%)` : "#222"; ctx.fillRect(10, i*kh + 10, canvas.width - 20, kh - 20); if(activeKeys[i] > 0) activeKeys[i]--; }
        } else if (currentMode === 'bounce') {
            ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
            items.forEach((l) => { l.vy += 0.5; l.y += l.vy; l.x += l.vx; if (l.y + l.size/2 > canvas.height) { l.y = canvas.height-l.size/2; l.vy *= -0.7; } if (l.x < 0 || l.x > canvas.width) l.vx *= -1; ctx.fillStyle = `hsl(${l.hue}, 100%, 50%)`; ctx.font = `bold ${l.size}px Arial`; ctx.textAlign="center"; ctx.fillText(l.char, l.x, l.y); });
        } else if (currentMode === 'piano') {
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            const kw = canvas.width/26;
            for(let i=0; i<26; i++) { const c = String.fromCharCode(65+i), isD = activeKeys[c]>0; ctx.fillStyle = isD ? `hsl(${(i/26)*360}, 100%, 50%)` : "#222"; ctx.fillRect(i*kw, canvas.height-120, kw-2, 120); if(isD) activeKeys[c]--; }
            items.forEach((p, i) => { p.y += p.vy; p.vy += 0.2; p.life -= 0.01; if(p.life <= 0) items.splice(i, 1); ctx.fillStyle = `hsla(${p.h}, 100%, 60%, ${p.life})`; ctx.font = "bold 60px Arial"; ctx.fillText(p.char, p.x, p.y); });
        }
        animationId = requestAnimationFrame(animate);
    }

    window.addEventListener('keydown', (e) => {
        if (currentMode === 'bounce') { const c = e.key.toUpperCase(); if(c.length !== 1) return; playSound(400); items.push({ char: c, x: Math.random()*canvas.width, y: -50, vy: 5, vx: (Math.random()-0.5)*6, size: 90, hue: Math.random()*360 }); }
        if (currentMode === 'piano') { const c = e.key.toUpperCase(); if(c.length !== 1 || c < 'A' || c > 'Z') return; const idx = c.charCodeAt(0) - 65; playSound(261.63 * Math.pow(1.059, idx)); activeKeys[c] = 15; items.push({ x: (idx*(canvas.width/26)) + (canvas.width/52), y: canvas.height-150, char: c, vy: -10, life: 1, h: (idx/26)*360 }); }
    });

    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
</script>
</body>
</html>
