<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Alaina's World — 21 free games, 15 stories, music & learning for kids. No downloads, no logins. Open and play instantly!">
    <meta name="keywords" content="kids games, children games, educational games, free games for kids, toddler games, learning games">
    <meta property="og:title" content="Alaina's World 🌟 — Free Kids Games & Stories">
    <meta property="og:description" content="21 games, 15 stories, music & learning. Free forever, no downloads needed.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://shiv-km.github.io/alaina-world/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#7C5CBF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alaina's World">
    <title>Alaina's World 🌟 — Games, Stories & Fun for Kids</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════
           DESIGN TOKENS
        ═══════════════════════════════════════ */
        :root {
            --pink:    #FF6B9D;
            --purple:  #7C5CBF;
            --yellow:  #FFC83D;
            --teal:    #4BC8A4;
            --blue:    #5BA4F5;
            --orange:  #FF8C42;
            --green:   #4CAF82;
            --red:     #FF5A5A;

            --bg:      #FFF8F0;
            --surface: #FFFFFF;
            --text:    #2D1B69;
            --muted:   #8B7CAB;
            --border:  rgba(124,92,191,0.12);

            --r-sm: 12px; --r-md: 20px; --r-lg: 28px;
            --shadow-sm: 0 2px 10px rgba(45,27,105,0.09);
            --shadow-md: 0 8px 28px rgba(45,27,105,0.14);
            --shadow-lg: 0 20px 60px rgba(45,27,105,0.22);

            --header-h: 60px;
            --nav-h:    68px;
            --safe-t:   env(safe-area-inset-top, 0px);
            --safe-b:   env(safe-area-inset-bottom, 0px);
        }

        /* ═══════════════════════════════════════
           RESET
        ═══════════════════════════════════════ */
        *, *::before, *::after {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html { height: 100%; }
        body {
            font-family: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100%; overflow-x: hidden;
        }
        button { font-family: inherit; cursor: pointer; }

        /* ═══════════════════════════════════════
           WELCOME SCREEN
        ═══════════════════════════════════════ */
        #welcome {
            position: fixed; inset: 0; z-index: 9000;
            background: linear-gradient(135deg,#FF6B9D 0%,#7C5CBF 50%,#5BA4F5 100%);
            background-size: 300% 300%;
            animation: wGrad 8s ease infinite;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden;
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        #welcome.out { opacity: 0; transform: scale(1.07); pointer-events: none; }
        @keyframes wGrad {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }
        .w-icon { font-size: clamp(4rem,13vw,7.5rem); animation: wIcon 2s ease-in-out infinite alternate; margin-bottom: 6px; }
        @keyframes wIcon { from{transform:scale(1) rotate(-7deg)} to{transform:scale(1.07) rotate(7deg)} }
        .w-title {
            font-family: 'Fredoka One', sans-serif;
            font-size: clamp(2.8rem,9vw,5.5rem);
            color: #fff; text-align: center; line-height: 1.1;
            text-shadow: 0 6px 28px rgba(0,0,0,0.22);
        }
        .w-tap {
            margin-top: 28px;
            color: rgba(255,255,255,0.9);
            font-size: clamp(1rem,3.5vw,1.4rem);
            font-weight: 700;
            animation: wTap 1.5s ease infinite;
        }
        @keyframes wTap { 0%,100%{opacity:0.55;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)} }
        .w-float {
            position: absolute; pointer-events: none;
            animation: wFloat linear infinite; opacity: 0.7;
        }
        @keyframes wFloat {
            from { transform: translateY(110vh) rotate(0deg); opacity:0.8; }
            to   { transform: translateY(-10vh) rotate(720deg); opacity:0; }
        }

        /* ═══════════════════════════════════════
           APP SHELL
        ═══════════════════════════════════════ */
        #app { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
        #app.hidden { display: none; }

        /* ── Header ── */
        #app-header {
            position: sticky; top: 0; z-index: 200;
            height: calc(var(--header-h) + var(--safe-t));
            padding-top: var(--safe-t);
            background: rgba(255,248,240,0.94);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-bottom: 1.5px solid var(--border);
            display: flex; align-items: center;
            justify-content: space-between;
            padding-left: 16px; padding-right: 16px;
        }
        .h-logo {
            font-family: 'Fredoka One', sans-serif;
            font-size: 1.45rem; color: var(--purple);
        }
        .h-logo em { font-style: normal; color: var(--pink); }
        .h-right { display: flex; align-items: center; gap: 9px; }
        .stars-pill {
            display: flex; align-items: center; gap: 5px;
            background: linear-gradient(135deg,#FFC83D,#FF8C42);
            color: #fff; font-weight: 800; font-size: 0.88rem;
            padding: 6px 13px; border-radius: 100px;
            box-shadow: 0 3px 12px rgba(255,140,66,0.38);
            user-select: none;
        }
        .h-profile {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg,var(--purple),var(--pink));
            border: none; color: #fff; font-size: 1.05rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-sm); transition: transform 0.15s;
        }
        .h-profile:active { transform: scale(0.9); }

        /* ── Hub ── */
        #hub {
            flex: 1; overflow-y: auto; overscroll-behavior: none;
            padding-bottom: calc(var(--nav-h) + var(--safe-b) + 20px);
        }

        /* ── Hero ── */
        .hero {
            background: linear-gradient(135deg,#2D1B69 0%,#7C5CBF 55%,#FF6B9D 100%);
            padding: 30px 20px 52px;
            text-align: center; position: relative; overflow: hidden;
        }
        .hero::after {
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
            height: 32px; background: var(--bg); border-radius: 32px 32px 0 0;
        }
        .hero-floats {
            display: flex; justify-content: center; gap: 12px; margin-bottom: 16px;
        }
        .hero-floats span {
            font-size: 2rem; display: inline-block;
            animation: hf 2.4s ease-in-out infinite;
        }
        .hero-floats span:nth-child(2) { animation-delay:0.4s; }
        .hero-floats span:nth-child(3) { animation-delay:0.8s; }
        .hero-floats span:nth-child(4) { animation-delay:1.2s; }
        .hero-floats span:nth-child(5) { animation-delay:1.6s; }
        @keyframes hf { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .hero h1 {
            font-family: 'Fredoka One', sans-serif;
            font-size: clamp(1.7rem,5.5vw,2.8rem);
            color: #fff; text-shadow: 0 4px 16px rgba(0,0,0,0.22);
            line-height: 1.15; margin-bottom: 7px;
        }
        .hero p { color: rgba(255,255,255,0.85); font-size: clamp(0.82rem,2.8vw,0.98rem); font-weight: 700; }

        /* ── Section blocks ── */
        .section-block { padding: 22px 14px 0; }
        .section-head { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; }
        .sh-icon {
            width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        .sh-label { font-family: 'Fredoka One', sans-serif; font-size: 1.18rem; color: var(--text); flex: 1; }
        .sh-count {
            font-size: 0.7rem; font-weight: 800; color: var(--muted);
            background: rgba(124,92,191,0.1); padding: 3px 8px; border-radius: 100px;
        }

        /* ── Game cards ── */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(146px,1fr));
            gap: 11px;
        }
        .game-card {
            border-radius: var(--r-md); overflow: hidden; cursor: pointer;
            border: none; outline: none; padding: 0;
            box-shadow: var(--shadow-sm); display: flex; flex-direction: column;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
            text-align: left;
        }
        .game-card:hover { transform: translateY(-4px) scale(1.025); box-shadow: var(--shadow-md); }
        .game-card:active { transform: scale(0.93); box-shadow: none; }
        .gc-art {
            height: 86px; display: flex; align-items: center; justify-content: center;
            font-size: 2.9rem; position: relative; flex-shrink: 0;
        }
        .gc-art::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom,transparent 45%,rgba(0,0,0,0.18));
        }
        .gc-badge {
            position: absolute; top: 7px; right: 7px; z-index: 2;
            background: rgba(255,255,255,0.88); border-radius: 100px;
            font-size: 0.6rem; font-weight: 800; padding: 2px 6px; color: var(--text);
        }
        .gc-body { background: var(--surface); padding: 9px 11px 11px; flex: 1; }
        .gc-title { font-weight: 800; font-size: 0.82rem; color: var(--text); line-height: 1.25; margin-bottom: 2px; }
        .gc-sub   { font-size: 0.7rem; color: var(--muted); font-weight: 600; line-height: 1.3; }

        /* ── Stories mega card ── */
        .story-mega {
            width: 100%; border-radius: var(--r-lg);
            background: linear-gradient(135deg,#7C5CBF 0%,#FF6B9D 100%);
            padding: 22px; border: none; cursor: pointer;
            box-shadow: var(--shadow-md); font-family: inherit;
            display: flex; align-items: center; gap: 16px;
            position: relative; overflow: hidden; text-align: left;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
        }
        .story-mega::after {
            content: '📖'; position: absolute; right: 16px; top: -10px;
            font-size: 5rem; opacity: 0.13; pointer-events: none;
        }
        .story-mega:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .story-mega:active { transform: scale(0.97); }
        .sm-icon { font-size: 2.8rem; flex-shrink: 0; }
        .sm-text { flex: 1; }
        .sm-text h3 { font-family: 'Fredoka One', sans-serif; font-size: 1.35rem; color: #fff; margin-bottom: 3px; }
        .sm-text p  { font-size: 0.82rem; color: rgba(255,255,255,0.85); font-weight: 700; }
        .sm-arrow   { font-size: 1.5rem; color: rgba(255,255,255,0.65); flex-shrink: 0; }

        /* ── Bottom nav ── */
        #bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + var(--safe-b));
            padding-bottom: var(--safe-b);
            background: rgba(255,248,240,0.96);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-top: 1.5px solid var(--border);
            display: flex; align-items: flex-start; padding-top: 8px;
            z-index: 200;
        }
        .nav-btn {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 3px;
            background: none; border: none; padding: 6px 0;
            transition: transform 0.15s;
        }
        .nav-btn:active { transform: scale(0.84); }
        .nav-btn .ni { font-size: 1.4rem; line-height: 1; transition: transform 0.2s; }
        .nav-btn .nl { font-size: 0.62rem; font-weight: 800; color: var(--muted); letter-spacing: 0.02em; }
        .nav-btn.on .nl { color: var(--purple); }
        .nav-btn.on .ni { transform: scale(1.15); }

        /* ═══════════════════════════════════════
           GAME LAYER
        ═══════════════════════════════════════ */
        #game-container { display: none; position: fixed; inset: 0; z-index: 300; background: #111; }
        canvas { display: block; touch-action: none; width: 100%; height: 100%; }

        /* ── Game bar (replaces floating back/clear btns) ── */
        #game-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 400;
            height: calc(54px + var(--safe-t));
            padding-top: var(--safe-t);
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: none; align-items: center;
            padding-left: 12px; padding-right: 12px; gap: 10px;
        }
        #game-bar.on { display: flex; }
        #back-btn {
            background: rgba(255,255,255,0.16); border: 1.5px solid rgba(255,255,255,0.28);
            color: #fff; border-radius: 100px; padding: 7px 16px;
            font-weight: 800; font-size: 0.82rem; transition: background 0.15s;
            white-space: nowrap;
        }
        #back-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.94); }
        #game-title-label {
            flex: 1; text-align: center; color: rgba(255,255,255,0.88);
            font-weight: 800; font-size: 0.88rem;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        #clear-btn {
            background: rgba(255,225,40,0.2); border: 1.5px solid rgba(255,225,40,0.38);
            color: #FFE83D; border-radius: 100px; padding: 7px 14px;
            font-weight: 800; font-size: 0.82rem; display: none; white-space: nowrap;
        }
        #clear-btn.on  { display: block; }
        #clear-btn:active { transform: scale(0.94); }

        /* ── Fullscreen btn ── */
        #fullscreen-btn {
            position: fixed; bottom: calc(16px + var(--safe-b)); right: 16px;
            width: 46px; height: 46px; border-radius: 50%;
            background: rgba(124,92,191,0.82); border: none; color: #fff;
            font-size: 1.1rem; display: none; align-items: center; justify-content: center;
            box-shadow: var(--shadow-md); z-index: 400;
            transition: transform 0.15s;
        }
        #fullscreen-btn.on { display: flex; }
        #fullscreen-btn:active { transform: scale(0.9); }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: calc(var(--nav-h) + var(--safe-b) + 14px);
            left: 50%; transform: translateX(-50%) translateY(16px);
            background: linear-gradient(135deg,var(--purple),var(--pink));
            color: #fff; padding: 11px 22px; border-radius: 100px;
            font-weight: 800; font-size: 0.88rem;
            box-shadow: var(--shadow-lg); opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; z-index: 500; white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ═══════════════════════════════════════
           PROFILE MODAL
        ═══════════════════════════════════════ */
        .pmodal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.52);
            display: flex; align-items: center; justify-content: center;
            z-index: 800; padding: 20px;
        }
        .pmodal-overlay.hidden { display: none; }
        .pmodal-box {
            background: #fff; border-radius: 28px; padding: 26px 20px 20px;
            max-width: 370px; width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.22);
            max-height: 90vh; overflow-y: auto;
        }
        .pmodal-box h2 {
            font-family: 'Fredoka One', sans-serif; color: var(--purple);
            margin-bottom: 18px; font-size: 1.4rem;
        }
        .pstats { display: flex; gap: 9px; margin-bottom: 20px; }
        .pstat {
            flex: 1; text-align: center; background: var(--bg);
            border-radius: 14px; padding: 11px 6px;
        }
        .pstat-val {
            display: block; font-family: 'Fredoka One', sans-serif;
            font-size: 1.55rem; color: var(--purple); line-height: 1.1;
        }
        .pstat-lbl { font-size: 0.66rem; font-weight: 800; color: var(--muted); }
        .pfield { margin-bottom: 16px; }
        .pfield label {
            display: block; font-weight: 800; font-size: 0.8rem;
            color: var(--muted); margin-bottom: 7px; letter-spacing: 0.03em;
        }
        .pfield input {
            width: 100%; padding: 10px 14px; border: 2px solid var(--border);
            border-radius: 14px; font-family: inherit; font-size: 0.95rem; outline: none;
        }
        .pfield input:focus { border-color: var(--purple); }
        .av-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .av-chip {
            font-size: 1.55rem; padding: 7px; border-radius: 13px;
            border: 3px solid transparent; background: var(--bg);
            cursor: pointer; line-height: 1; transition: border-color 0.12s, transform 0.1s;
        }
        .av-chip.on { border-color: var(--purple); background: rgba(124,92,191,0.1); }
        .av-chip:active { transform: scale(0.85); }
        .pmodal-btns { display: flex; gap: 8px; margin-top: 6px; }
        .pmodal-btns button {
            flex: 1; padding: 12px; border: none; border-radius: 14px;
            font-family: inherit; font-size: 0.9rem; font-weight: 800; cursor: pointer;
        }
        .pbtn-save  { background: var(--purple); color: #fff; }
        .pbtn-close { background: var(--bg); color: var(--text); }

        /* ── Coloring Studio card ── */
        .color-studio-card {
            width: 100%; border-radius: var(--r-lg);
            background: linear-gradient(135deg,#FF8C42 0%,#FFC83D 100%);
            padding: 20px; border: none; cursor: pointer;
            box-shadow: var(--shadow-md); font-family: inherit;
            display: flex; align-items: center; gap: 14px;
            position: relative; overflow: hidden; text-align: left;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
            margin-top: 11px;
        }
        .color-studio-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .color-studio-card:active { transform: scale(0.97); }
        .csc-icon { font-size: 2.6rem; flex-shrink: 0; }
        .csc-text h3 { font-family: 'Fredoka One', sans-serif; font-size: 1.25rem; color: #fff; margin-bottom: 2px; }
        .csc-text p  { font-size: 0.8rem; color: rgba(255,255,255,0.88); font-weight: 700; }

        /* ═══════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════ */
        @media (min-width: 640px) {
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(158px,1fr)); }
            .gc-art { height: 96px; font-size: 3.2rem; }
        }
        @media (min-width: 900px) {
            #bottom-nav { display: none; }
            #hub { padding-bottom: 40px; }
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(168px,1fr)); gap: 14px; }
            .section-block { padding: 26px 20px 0; }
        }
    </style>
</head>
<body>

<!-- ── WELCOME ── -->
<div id="welcome" onclick="dismissWelcome()" role="button" aria-label="Enter Alaina's World">
    <div class="w-icon">🌟</div>
    <div class="w-title">Alaina's<br>World</div>
    <div class="w-tap">✨ Tap anywhere to play! ✨</div>
</div>

<!-- ── APP SHELL ── -->
<div id="app">
    <header id="app-header">
        <div class="h-logo">🌟 <em>Alaina's</em> World</div>
        <div class="h-right">
            <div class="stars-pill" aria-label="Stars collected">⭐ <span id="starsCount">0</span></div>
            <button class="h-profile" id="profileBtn" aria-label="Profile" onclick="openProfile()">👤</button>
        </div>
    </header>

    <main id="hub" role="main"></main>

    <nav id="bottom-nav" aria-label="Main navigation">
        <button class="nav-btn on" onclick="scrollToHubTop()" aria-label="Games">
            <span class="ni">🎮</span><span class="nl">Games</span>
        </button>
        <button class="nav-btn" onclick="goStories()" aria-label="Stories">
            <span class="ni">📖</span><span class="nl">Stories</span>
        </button>
        <button class="nav-btn" onclick="showToast('🏆 Rewards coming soon!')" aria-label="Rewards">
            <span class="ni">🏆</span><span class="nl">Rewards</span>
        </button>
    </nav>
</div>

<!-- ── GAME BAR (overlaid on canvas) ── -->
<div id="game-bar" role="toolbar">
    <button id="back-btn" onclick="goHome()" aria-label="Return to menu">🏠 Menu</button>
    <span id="game-title-label" aria-live="polite"></span>
    <button id="clear-btn" onclick="clearCanvas()" aria-label="Clear canvas">🧹 Clear</button>
</div>

<!-- ── FULLSCREEN ── -->
<button id="fullscreen-btn" onclick="toggleFullscreen()" aria-label="Toggle fullscreen">⛶</button>

<!-- ── GAME CANVAS ── -->
<div id="game-container" aria-hidden="true">
    <canvas id="mainCanvas"></canvas>
</div>

<!-- ── TOAST ── -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- ── PROFILE MODAL ── -->
<div id="profile-modal" class="pmodal-overlay hidden" role="dialog" aria-modal="true" aria-label="My Profile">
    <div class="pmodal-box">
        <h2>👤 My Profile</h2>
        <div class="pstats">
            <div class="pstat"><span class="pstat-val" id="pm-stars">0</span><span class="pstat-lbl">⭐ Stars</span></div>
            <div class="pstat"><span class="pstat-val" id="pm-streak">0</span><span class="pstat-lbl">🔥 Streak</span></div>
            <div class="pstat"><span class="pstat-val" id="pm-played">0</span><span class="pstat-lbl">🎮 Games</span></div>
        </div>
        <div class="pfield">
            <label>My Name</label>
            <input id="pm-name" type="text" maxlength="20" placeholder="Alaina">
        </div>

function checkAndUpdateStreak() {
    const today = new Date().toISOString().slice(0,10);
    const lastDate = localStorage.getItem('aw_streak_date') || '';
    if (lastDate === today) return;
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    let s = parseInt(localStorage.getItem('aw_streak') || '0');
    s = lastDate===yesterday ? s+1 : 1;
    localStorage.setItem('aw_streak', s);
    localStorage.setItem('aw_streak_date', today);
    if (s >= 2) showToast(`🔥 ${s} day streak! Keep it up!`);

}

function unlockAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(f, t = 'sine', d = 0.4) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}
function playSadSound() {
    if (!audioCtx) return;
    playSound(350, 'triangle', 0.25);
    setTimeout(() => playSound(220, 'triangle', 0.35), 180);
}
function playChime(idx) {
    const notes = [523.25,587.33,659.25,698.46,783.99,880.00,987.77,1046.50];
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(notes[idx % 8], audioCtx.currentTime);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.8);
}
function playNoise(duration, filterFreq, vol) {
    if (!audioCtx) return;
    const bufSize = Math.floor(audioCtx.sampleRate * duration);
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const flt = audioCtx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = filterFreq; flt.Q.value = 0.5;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
    src.start(); src.stop(audioCtx.currentTime + duration);
}
function playDrum(zone) {
    if (!audioCtx) return;
    if (zone === 'kick') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.setValueAtTime(180, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.25);
        g.gain.setValueAtTime(1.5, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.4);
    } else if (zone === 'snare') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.value = 200; g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
        playNoise(0.15, 2000, 0.6);
    } else if (zone === 'hihat') {
        playNoise(0.06, 8000, 0.4);
    } else if (zone === 'cymbal') {
        playNoise(0.5, 5000, 0.3);
    } else if (zone === 'tom') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.setValueAtTime(120, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(55, audioCtx.currentTime + 0.18);
        g.gain.setValueAtTime(1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.3);
    }
}

function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x:(e.clientX-r.left)*(canvas.width/r.width), y:(e.clientY-r.top)*(canvas.height/r.height) };
}
function drawRoundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y); ctx.arcTo(x+w,y, x+w,y+h, r); ctx.arcTo(x+w,y+h, x,y+h, r);
    ctx.arcTo(x,y+h, x,y, r); ctx.arcTo(x,y, x+w,y, r); ctx.closePath();
}
function drawScore(dark = false) {
    ctx.save();
    ctx.font = 'bold 38px Arial'; ctx.textAlign = 'right';
    ctx.strokeStyle = dark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 5; ctx.fillStyle = dark ? '#333' : 'white';
    const label = `⭐ ${score}`;
    ctx.strokeText(label, canvas.width-18, 52); ctx.fillText(label, canvas.width-18, 52);
    ctx.restore();
}
function spawnMiss(x) { missEffects.push({x, y:canvas.height-80, life:70}); }
function drawMisses() {
    missEffects = missEffects.filter(m => m.life > 0);
    missEffects.forEach(m => {
        ctx.save(); ctx.globalAlpha = m.life/70;
        ctx.font = 'bold 44px Arial'; ctx.fillStyle = '#ff5555'; ctx.textAlign = 'center';
        ctx.fillText('💨 Miss!', m.x, m.y); m.y -= 1.2; m.life--;
        ctx.restore();
    });
}

// ── Shape drawing helpers ────────────────────────
function drawStar(x, y, outerR, innerR, pts) {
    ctx.beginPath();
    for (let i = 0; i < pts*2; i++) {
        const ang = (i*Math.PI/pts) - Math.PI/2;
        const r = i%2===0 ? outerR : innerR;
        i===0 ? ctx.moveTo(x+r*Math.cos(ang), y+r*Math.sin(ang))
              : ctx.lineTo(x+r*Math.cos(ang), y+r*Math.sin(ang));
    }
    ctx.closePath(); ctx.fill();
}
function drawHeart(x, y, s) {
    const r = s * 0.28;
    ctx.beginPath();
    ctx.moveTo(x, y + s*0.22);
    ctx.bezierCurveTo(x, y-r*0.5, x-r*1.7, y-r*0.5, x-r*1.7, y+r*0.4);
    ctx.bezierCurveTo(x-r*1.7, y+r*1.2, x, y+r*1.9, x, y+s*0.5);
    ctx.bezierCurveTo(x, y+r*1.9, x+r*1.7, y+r*1.2, x+r*1.7, y+r*0.4);
    ctx.bezierCurveTo(x+r*1.7, y-r*0.5, x, y-r*0.5, x, y+s*0.22);
    ctx.closePath(); ctx.fill();
}
function drawShape(name, x, y, s, color) {
    ctx.fillStyle = color;
    if      (name==='Circle')   { ctx.beginPath(); ctx.arc(x,y,s/2,0,Math.PI*2); ctx.fill(); }
    else if (name==='Square')   { ctx.fillRect(x-s/2, y-s/2, s, s); }
    else if (name==='Triangle') { ctx.beginPath(); ctx.moveTo(x,y-s/2); ctx.lineTo(x+s/2,y+s/2); ctx.lineTo(x-s/2,y+s/2); ctx.closePath(); ctx.fill(); }
    else if (name==='Star')     { drawStar(x, y, s/2, s/4, 5); }
    else if (name==='Diamond')  { ctx.beginPath(); ctx.moveTo(x,y-s/2); ctx.lineTo(x+s/3,y); ctx.lineTo(x,y+s/2); ctx.lineTo(x-s/3,y); ctx.closePath(); ctx.fill(); }
    else if (name==='Heart')    { drawHeart(x, y-s*0.15, s); }
}

// ── Brain-game round/init helpers ────────────────
function memMatchInit() {
    const pairs = [...MEM_EMOJIS, ...MEM_EMOJIS].sort(()=>Math.random()-0.5);
    const cols = 4, rows = 4, padX = 14, padY = 82;
    const cardW = (canvas.width - padX*2 - 8*(cols-1)) / cols;
    const cardH = (canvas.height - padY - 20 - 8*(rows-1)) / rows;
    memCards = pairs.map((emoji, i) => ({
        emoji,
        x: padX + (i%cols)*(cardW+8),
        y: padY + Math.floor(i/cols)*(cardH+8),
        w: cardW, h: cardH,
        flipped: false, matched: false
    }));
    memFlipped = []; memMatched = 0; memLocked = false;
}
function shapeMatchNewRound() {
    if (currentMode!=='shapeMatch') return;
    shapeOptions = [...SHAPE_NAMES].sort(()=>Math.random()-0.5).slice(0,4);
    shapeTarget  = Math.floor(Math.random()*4);
    shapeFeedback = null;
}
function mathNewRound() {
    if (currentMode!=='mathFun') return;
    const diff = Math.min(Math.floor(score/3)+1, 5);
    const max  = diff<=1 ? 5 : diff<=2 ? 10 : diff<=3 ? 15 : 20;
    const a = Math.floor(Math.random()*max)+1;
    const b = Math.floor(Math.random()*Math.max(1,max-a))+1;
    const sub = diff>=3 && Math.random()<0.4 && a>=b;
    const op  = sub ? '-' : '+';
    const ans = op==='+' ? a+b : a-b;
    const wrongs = new Set();
    while (wrongs.size<2) {
        const off = Math.floor(Math.random()*4)+1;
        const w = ans + (Math.random()<0.5 ? off : -off);
        if (w!==ans && w>=0 && w<=40) wrongs.add(w);
    }
    mathOptions = [...wrongs, ans].sort(()=>Math.random()-0.5);
    mathProblem = {a, b, op, ans};
    mathFeedback = null;
}
function wordMatchNewRound() {
    if (currentMode!=='wordMatch') return;
    wordOptions = [...WORD_DATA].sort(()=>Math.random()-0.5).slice(0,4);
    wordTarget  = Math.floor(Math.random()*4);
    wordFeedback = null;
}
function colorMixNewRound() {
    if (currentMode!=='colorMix') return;
    mixQ = {...COLOR_MIX_DATA[Math.floor(Math.random()*COLOR_MIX_DATA.length)]};
    const wrongs = COLOR_MIX_DATA.filter(q=>q.result!==mixQ.result)
        .sort(()=>Math.random()-0.5).slice(0,2)
        .map(q=>({label:q.result, color:q.rc}));
    const correct = {label:mixQ.result, color:mixQ.rc};
    mixQ.options = [...wrongs, correct].sort(()=>Math.random()-0.5);
    mixQ.correctIdx = mixQ.options.findIndex(o=>o.label===mixQ.result);
    mixFeedback = null;
}
function animalSpeak(a) {
    window.speechSynthesis.cancel();
    const u1 = new SpeechSynthesisUtterance(a.n);
    u1.pitch = 1.3; u1.rate = 0.9; window.speechSynthesis.speak(u1);
    setTimeout(()=>{
        if (currentMode!=='animalSound') return;
        const u2 = new SpeechSynthesisUtterance(a.s);
        u2.pitch = 1.5; u2.rate = 0.85; window.speechSynthesis.speak(u2);
    }, 1300);
}

function startGame(m) {
    unlockAudio();
    gamesPlayed++;
    localStorage.setItem('aw_games_played', gamesPlayed);
    appEl.classList.add('hidden');
    container.style.display = 'block';
    gameBar.classList.add('on');
    fsBtn.classList.add('on');
    titleLabel.textContent = GAME_NAMES[m] || m;

    const showClear = ['paint','glow','magicWand','songBuilder'].includes(m);
    clearBtn.classList.toggle('on', showClear);

    currentMode = m;
    items = []; activeKeys = {}; hue = 0;
    abcIndex = 0; abcState = 'letter'; abcClearTimer();
    basketX = canvas.width / 2;
    score = 0; missEffects = [];
    isPointerDown = false; lastX = null; lastY = null;
    colorOptions = []; colorTarget = 0; colorFeedback = null; colorSpeed = 180;
    drumActive = {};
    songGrid = null; songStep = 0; songLastTime = 0;
    frogTongue = null;
    popGameOver = false; popStartTime = 0;

    clearCanvas();
    animate();

    if (m === 'abc' || m === 'numberBounce') {
        const unlock = new SpeechSynthesisUtterance(' ');
        unlock.volume = 0; window.speechSynthesis.cancel(); window.speechSynthesis.speak(unlock);
    }
    if (m === 'abc') abcTimer = setTimeout(abcShowWord, 2000);
    if (m === 'songBuilder') { songGrid = Array(8).fill(null).map(()=>Array(8).fill(false)); songLastTime = performance.now(); }
    if (m === 'colorMatch') colorMatchNewRound();
    if (m === 'popEverything') popStartTime = performance.now();
    if (m === 'memoryMatch') memMatchInit();
    if (m === 'shapeMatch')  shapeMatchNewRound();
    if (m === 'mathFun')     mathNewRound();
    if (m === 'wordMatch')   wordMatchNewRound();
    if (m === 'colorMix')    colorMixNewRound();
    if (m === 'balloonPop')  { balloonTarget = 1; }
    if (m === 'animalSound') {
        animalIdx = 0; animalTimer2 = null;
        const ua = new SpeechSynthesisUtterance(' ');
        ua.volume = 0; window.speechSynthesis.cancel(); window.speechSynthesis.speak(ua);
        animalTimer2 = setTimeout(() => animalSpeak(ANIMALS[0]), 1000);
    }
    if (m === 'cloudJumper') {
        for (let i = 0; i < 5; i++)
            items.push({type:'cloud', x:Math.random()*canvas.width, y:20+Math.random()*100, w:80+Math.random()*120, v:0.2+Math.random()*0.4});
    }
}

function goHome() {
    cancelAnimationFrame(animationId);
    window.speechSynthesis.cancel();
    abcClearTimer();
    if (animalTimer2) { clearTimeout(animalTimer2); animalTimer2 = null; }
    if (glowOsc) { try { glowOsc.stop(); } catch(e) {} glowOsc = null; }

    // Award stars for scored games
    if (score > 0) addStars(Math.max(1, Math.floor(score / 3)));

    currentMode = null;
    container.style.display = 'none';
    gameBar.classList.remove('on');
    clearBtn.classList.remove('on');
    fsBtn.classList.remove('on');

function clearCanvas() {
    const dark = ['piano','mobilePiano','abc','starCatcher','fruit','glow','fireworks','magicWand','snowflake','drumKit','songBuilder','frogJump'];
    ctx.fillStyle = dark.includes(currentMode) ? '#000' : '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (currentMode !== 'paint' && currentMode !== 'glow') items = [];
    if (currentMode === 'songBuilder' && songGrid) songGrid = Array(8).fill(null).map(()=>Array(8).fill(false));

}
